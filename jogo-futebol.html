let hinoTimers = [];
function pararHino() { hinoTimers.forEach(clearTimeout); hinoTimers = []; }
function tocarHino(sigla) {
  pararHino();
  audioInit();
  if (!actx) return;
  somTorcida(0.05, 3.5, 550);   // murmúrio da arquibancada
  const seq = HINOS[sigla] || HINOS.GEN;
  let t = 250;
  for (const nd of seq.split(',')) {
    const par = nd.split(':');
    const freq = 440 * Math.pow(2, (+par[0] - 69) / 12);
    const dur = +par[1] * 0.42;
    hinoTimers.push(setTimeout(() => beep(freq, dur * 0.95, 'triangle', 0.1), t));
    t += dur * 1000;
  }
}

// ================== Abertura da partida ==================
function perfilar() {
  for (const p of players) {
    p.x = FX0 + 60 + p.k * (FWID - 120) / 9;
    p.y = CYW + (p.side === 0 ? 34 : -34);
    p.vx = 0; p.vy = 0;
  }
  ball.x = CX; ball.y = CYW;
}

function updateAbertura(dt) {
  const ab = M.ab;
  ab.timer += dt;
  const pular = acaoChute || acaoPasse;
  if (ab.fase < 2) {
    if (ab.timer > 8.6 || pular) {
      pararHino();
      ab.fase++;
      ab.timer = 0;
      if (ab.fase === 1) tocarHino(SELECOES[M.iA].s);
    }
  } else {
    ab.zoom = Math.min(1, ab.timer / 1.3);
    if (ab.zoom >= 1) { posicionar(0); M.estado = 'play'; somApito(); }
  }
}

function drawBandeira(x, y, w, h, sigla) {
  const f = FLAGS[sigla] || ['h', '#888', '#aaa', '#888'];
  const tipo = f[0];
  ctx.save();
  roundRect(x, y, w, h, 6);
  ctx.clip();
  if (tipo === 'v') {
    for (let i = 0; i < 3; i++) { ctx.fillStyle = f[1 + i]; ctx.fillRect(x + i * w / 3, y, w / 3 + 1, h); }
  } else if (tipo === 'c') {
    ctx.fillStyle = f[1]; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = f[2];
    ctx.fillRect(x, y + h / 2 - h * 0.11, w, h * 0.22);
    ctx.fillRect(x + w * 0.32, y, w * 0.16, h);
  } else if (tipo === 'd') {
    ctx.fillStyle = f[1]; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = f[2];
    ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, h * 0.26, 0, 6.29); ctx.fill();
  } else {
    for (let i = 0; i < 3; i++) { ctx.fillStyle = f[1 + i]; ctx.fillRect(x, y + i * h / 3, w, h / 3 + 1); }
  }
  if (f[4] && tipo !== 'd') {
    ctx.fillStyle = f[4];
    ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, h * 0.22, 0, 6.29); ctx.fill();
  }
  ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2;
  roundRect(x, y, w, h, 6); ctx.stroke();
}

function drawAbertura() {
  const ab = M.ab;
  ctx.textAlign = 'center';
  ctx.font = 'bold 20px "Comic Sans MS","Segoe UI",Arial';
  ctx.lineWidth = 5; ctx.strokeStyle = '#5a3a00'; ctx.fillStyle = '#ffd166';
  ctx.strokeText('Arena Panzuda · Copa 2026', W / 2, 40);
  ctx.fillText('Arena Panzuda · Copa 2026', W / 2, 40);
  if (ab.fase === 2) return;
  const sel = SELECOES[ab.fase === 0 ? M.iB : M.iA];
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(30, H - 250, W - 60, 175, 14); ctx.fill();
  drawBandeira(55, H - 225, 115, 76, sel.s);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 24px "Segoe UI",Arial';
  ctx.fillText(sel.n, 190, H - 185);
  ctx.fillStyle = '#fff';
  ctx.font = '15px "Segoe UI",Arial';
  ctx.fillText('Hino Nacional', 190, H - 152);
  for (let i = 0; i < 3; i++) {
    const t = (clock * 0.7 + i / 3) % 1;
    ctx.globalAlpha = 1 - t;
    ctx.font = (13 + 6 * t) + 'px Arial';
    ctx.fillText('🎵', 310 + i * 42, H - 152 - t * 55);
    ctx.globalAlpha = 1;
  }
  ctx.font = '13px "Segoe UI",Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText('ESPAÇO ou toque para pular', 190, H - 108);
}

// ================== Banco, técnico e reservas ==================
function drawMiniGordo(x, y, c1, c2, tom, cab, esc, braco) {
  const pele = TONS[tom];
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(esc, esc);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 13, 12, 4, 0, 0, 6.29); ctx.fill();
  ctx.strokeStyle = pele; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-10, -2); ctx.lineTo(-14, 4 - braco * 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -2); ctx.lineTo(14, 4 + braco * 20); ctx.stroke();
  const g2 = ctx.createRadialGradient(-3, -4, 2, 0, 0, 15);
  g2.addColorStop(0, c1); g2.addColorStop(0.72, c1); g2.addColorStop(1, c2);
  ctx.fillStyle = g2;
  ctx.beginPath(); ctx.ellipse(0, 2, 11.5, 10.5, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = pele;
  ctx.beginPath(); ctx.arc(0, -13, 6.5, 0, 6.29); ctx.fill();
  ctx.fillStyle = cab;
  ctx.beginPath(); ctx.arc(0, -16, 4.4, 3.3, 6.1); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-2.2, -13.5, 0.9, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(2.2, -13.5, 0.9, 0, 6.29); ctx.fill();
  ctx.restore();
}

function drawBancos() {
  if (!M || !M.bancos) return;
  ctx.lineWidth = 2;
  for (const side of [0, 1]) {
    const bx = side === 0 ? 68 : WW - 68;
    const tc = corTime(side);
    const tec = M.tecs[side];
    // técnico de pé, gesticulando com a partida
    drawMiniGordo(bx, CYW - 205, '#2b2b2b', '#101010', tec.tom, '#1a1a1a', 1, Math.sin(clock * 3 + side * 2) * 0.3);
    ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.fillStyle = '#ffd166';
    ctx.strokeText(tec.nome + ' (téc.)', bx, CYW - 183);
    ctx.fillText(tec.nome + ' (téc.)', bx, CYW - 183);
    // reservas sentados no banco
    M.bancos[side].forEach((r2, i) => {
      const ry = CYW - 135 + i * 62;
      drawMiniGordo(bx, ry, tc[0], tc[1], r2.tom, r2.cab, 0.82, 0);
      ctx.font = '7.5px Arial'; ctx.fillStyle = '#fff';
      ctx.strokeText(r2.nome, bx, ry + 25);
      ctx.fillText(r2.nome, bx, ry + 25);
    });
  }
}

// ================== Tática: formação e substituições ==================
function toggleTatica() {
  if (!M || tela !== 'jogo') return;
  if (M.estado === 'tatica') { M.estado = M.taticaPrev || 'play'; M.taticaPrev = null; }
  else if (['play', 'parada', 'intervalo'].includes(M.estado)) {
    M.taticaPrev = M.estado; M.estado = 'tatica'; M.selTit = -1;
  }
}

function substituir(tit, iRes) {
  if (!tit || M.subs >= 5) return;
  const res = M.bancos[0][iRes];
  if (!res) return;
  M.bancos[0][iRes] = { nome: tit.nome, tom: tit.tom, cab: tit.cab };
  tit.nome = res.nome; tit.tom = res.tom; tit.cab = res.cab;
  tit.stamina = 1; tit.amarelos = 0;
  M.subs++;
  anunciar('SUBSTITUIÇÃO');
  beep(880, 0.15, 'triangle', 0.07);
}

  ctx.fillStyle = 'rgba(0,0,0,0.8)';

    ctx.fillText(p.num + ' · ' + p.nome + (p.gk ? ' (GOL)' : ''), x + 10, y + 24);
    if (p.amarelos === 1) { ctx.fillStyle = '#ffd400'; ctx.fillRect(x + 212, y + 10, 10, 16); }
    botoes.push({ x, y, w: 235, h: 37, cb: () => { M.selTit = selecionado ? -1 : i; } });
  });
  ctx.fillStyle = '#9fc'; ctx.font = 'bold 14px "Segoe UI",Arial';
  ctx.fillText('Banco — quem entra (' + (5 - M.subs) + ' substituições restantes):', 28, 442);

    const x = 28 + (i % 2) * 245, y = 454 + Math.floor(i / 2) * 45;
    ctx.fillStyle = 'rgba(120,200,255,0.12)';
    roundRect(x, y, 235, 37, 8); ctx.fill();

    ctx.fillText(r.nome, x + 10, y + 24);
    botoes.push({ x, y, w: 235, h: 37, cb: () => {
      if (M.selTit >= 0) { substituir(players.filter(p => p.side === 0)[M.selTit], i); M.selTit = -1; }

function abandonarPartida() {
  pararHino();
  if (modo === 'copa' && copa && !copa.fim) {
    if (copa.fase === 'grupos') registrarGrupo(0, 2);   // W.O.: derrota

// ================== Trajetória da falta e telão do gol ==================
function drawTrajetoria() {
  const pa = M.parada;
  const gy = golAtkY(0);
  const d = Math.hypot(pa.mira - ball.x, gy - ball.y) || 1;
  let x = ball.x, y = ball.y;
  let vx = (pa.mira - ball.x) / d * 500, vy = (gy - ball.y) / d * 500;
  let z = 0, vz = pa.loft;
  ctx.fillStyle = 'rgba(255,220,80,0.9)';
  for (let i = 0; i < 44; i++) {
    const st = 0.035;
    x += vx * st; y += vy * st;
    z += vz * st; vz -= 620 * st;
    if (z < 0) break;
    const fr = Math.max(0, 1 - 0.15 * st);
    vx *= fr; vy *= fr;
    ctx.globalAlpha = Math.max(0.2, 1 - i / 40);
    ctx.beginPath(); ctx.arc(x, y - z * 0.55, 3.2, 0, 6.29); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(pa.mira, gy, 8, 0, 6.29); ctx.stroke();
}

function drawTelao() {
  const aut = M.autor || M.golContra;
  const y0 = 92;
  ctx.fillStyle = '#101010';
  roundRect(W / 2 - 190, y0, 380, 150, 10); ctx.fill();

  ctx.textAlign = 'center';

  ctx.fillText('📺 TELÃO DA ARENA PANZUDA', W / 2, y0 + 24);
  const tc = corTime(aut.side);
  drawMiniGordo(W / 2 - 100, y0 + 90, tc[0], tc[1], aut.tom, aut.cab, 1.6, Math.sin(clock * 6) * 0.2);
  const mastiga = Math.sin(clock * 14) * 3;

function kit(i, n) {
  const sel = SELECOES[i];
  if (!n) return [sel.c1, sel.c2];
  return KIT2[sel.s] || [sel.c2, sel.c1];
}
function corTime(side) {
  if (!M) return ['#888', '#555'];
  return kit(side === 0 ? M.iA : M.iB, side === 0 ? M.kitA : M.kitB);
}
function corDist(a, b) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  return Math.hypot((pa >> 16) - (pb >> 16), ((pa >> 8) & 255) - ((pb >> 8) & 255), (pa & 255) - (pb & 255));
}
// CPU troca de uniforme se as camisas ficarem parecidas
function kitCpu(iA, kA, iB) {
  const minha = kit(iA, kA)[0];
  const d0 = corDist(minha, kit(iB, 0)[0]);
  if (d0 >= 140) return 0;
  return corDist(minha, kit(iB, 1)[0]) > d0 ? 1 : 0;
}

// ================== Campeonato Brasileiro (pontos corridos) ==================
let liga = null;

function gerarTabela(times) {
  // método do círculo: n-1 rodadas, n/2 jogos por rodada
  const t = times.slice();
  const n = t.length;
  const rodadas = [];
  for (let r = 0; r < n - 1; r++) {
    const jogos = [];
    for (let i = 0; i < n / 2; i++) {
      const casa = t[i], fora = t[n - 1 - i];
      // alterna mando para variar
      jogos.push(r % 2 ? [fora, casa] : [casa, fora]);
    }
    rodadas.push(jogos);
    t.splice(1, 0, t.pop());   // rotaciona mantendo o primeiro fixo
  }
  return rodadas;
}

function iniciarLiga() {
  const times = [];
  for (let i = N_COPA; i < N_EURO0; i++) times.push(i);
  const tab = {};
  for (const c of times) tab[c] = { pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0 };
  liga = { times, tab, fixtures: gerarTabela(times), rodada: 0, fim: null };
  tela = 'liga';
}

function jogoDaRodada() {   // confronto do usuário na rodada atual
  const jogos = liga.fixtures[liga.rodada];
  for (const [a, b] of jogos) if (a === selUser || b === selUser) return [a, b];
  return null;
}

function atualizaLiga(a, b, ga, gb) {
  const A = liga.tab[a], B = liga.tab[b];
  A.j++; B.j++; A.gp += ga; A.gc += gb; B.gp += gb; B.gc += ga;
  if (ga > gb) { A.pts += 3; A.v++; B.d++; }
  else if (gb > ga) { B.pts += 3; B.v++; A.d++; }
  else { A.pts++; B.pts++; A.e++; B.e++; }
}

function simulaJogo(a, b) {
  const fa = forcaDe(a), fb = forcaDe(b);
  const ga = Math.floor(Math.random() * (1 + fa / 1.6) + (Math.random() < 0.35 ? 1 : 0));
  const gb = Math.floor(Math.random() * (1 + fb / 1.6) + (Math.random() < 0.35 ? 1 : 0));
  return [ga, gb];
}

function registrarLiga(ga, gb) {
  const meu = jogoDaRodada();
  // resultado do usuário
  if (meu[0] === selUser) atualizaLiga(meu[0], meu[1], ga, gb);
  else atualizaLiga(meu[0], meu[1], gb, ga);
  // simula os outros 9 jogos
  for (const [a, b] of liga.fixtures[liga.rodada]) {
    if (a === selUser || b === selUser) continue;
    const [x, y] = simulaJogo(a, b);
    atualizaLiga(a, b, x, y);
  }
  liga.rodada++;
  if (liga.rodada >= liga.fixtures.length) fecharLiga();
}

function ordemLiga() {
  return liga.times.slice().sort((a, b) => {
    const A = liga.tab[a], B = liga.tab[b];
    return (B.pts - A.pts) || (B.v - A.v) || ((B.gp - B.gc) - (A.gp - A.gc)) || (B.gp - A.gp);
  });
}

function fecharLiga() {
  const ordem = ordemLiga();
  const pos = ordem.indexOf(selUser) + 1;
  liga.fim = pos === 1 ? 'campeao' : pos >= 17 ? 'rebaixado' : 'fim';
  liga.posFinal = pos;
}

function drawLiga() {
  fundoMenu();
  ctx.textAlign = 'center';
  ctx.font = 'bold 22px "Segoe UI",Arial'; ctx.fillStyle = '#ffd166';
  ctx.fillText('🇧🇷 Brasileirão 2026', W / 2, 34);

  if (liga.fim) {
    ctx.font = '60px Arial';
    ctx.fillText(liga.fim === 'campeao' ? '🏆' : liga.fim === 'rebaixado' ? '😱' : '🙂', W / 2, 120);
    ctx.font = 'bold 24px "Comic Sans MS","Segoe UI",Arial'; ctx.fillStyle = '#ffd166';
    const nm = SELECOES[selUser].n;
    ctx.fillText(liga.fim === 'campeao' ? nm + ' CAMPEÃO BRASILEIRO!' :
      liga.fim === 'rebaixado' ? nm + ' foi REBAIXADO...' :
      nm + ' terminou em ' + liga.posFinal + 'º', W / 2, 165);
    ctx.font = '15px "Segoe UI",Arial'; ctx.fillStyle = '#cde';
    ctx.fillText(liga.fim === 'campeao' ? 'Volta olímpica com a barriga cheia de brigadeiro!' :
      liga.fim === 'rebaixado' ? 'Série B ano que vem. Menos coxinha, mais corrida!' :
      'Campanha digna de um bom churrasco.', W / 2, 195);
  }

  const ordem = ordemLiga();
  const y0 = liga.fim ? 232 : 78, rowH = liga.fim ? 26 : 30;
  ctx.font = 'bold 11px "Segoe UI",Arial'; ctx.textAlign = 'left'; ctx.fillStyle = '#9fc';
  ctx.fillText('#   Clube', 20, y0 - 16);
  ctx.textAlign = 'right';
  ctx.fillText('J', 380, y0 - 16); ctx.fillText('SG', 430, y0 - 16); ctx.fillText('PTS', 495, y0 - 16);
  ordem.forEach((c, i) => {
    const t = liga.tab[c], y = y0 + i * rowH;
    const zona = i < 4 ? 'rgba(90,200,120,0.16)' : i >= 16 ? 'rgba(220,80,80,0.16)' : 'rgba(255,255,255,0.05)';
    ctx.fillStyle = c === selUser ? 'rgba(255,209,102,0.2)' : zona;
    roundRect(14, y - rowH + 6, W - 28, rowH - 3, 6); ctx.fill();
    ctx.fillStyle = i < 4 ? '#9f9' : i >= 16 ? '#f99' : '#ccc';
    ctx.font = 'bold 11px "Segoe UI",Arial'; ctx.textAlign = 'left';
    ctx.fillText((i + 1) + '', 20, y - 5);
    ctx.fillStyle = SELECOES[c].c1;
    ctx.beginPath(); ctx.arc(46, y - 9, 7, 0, 6.29); ctx.fill();
    ctx.strokeStyle = SELECOES[c].c2; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = c === selUser ? '#ffd166' : '#fff';
    ctx.font = (c === selUser ? 'bold ' : '') + '12px "Segoe UI",Arial';
    ctx.fillText(SELECOES[c].n, 60, y - 5);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ccc'; ctx.font = '11px "Segoe UI",Arial';
    ctx.fillText(t.j, 380, y - 5);
    ctx.fillText((t.gp - t.gc > 0 ? '+' : '') + (t.gp - t.gc), 430, y - 5);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px "Segoe UI",Arial';
    ctx.fillText(t.pts, 490, y - 5);
    ctx.textAlign = 'left';
  });

  ctx.textAlign = 'center';
  if (liga.fim) {
    botao(W / 2 - 110, H - 66, 220, 48, 'Voltar ao menu', () => { tela = 'menu'; });
    return;
  }
  const meu = jogoDaRodada();
  const adv = meu[0] === selUser ? meu[1] : meu[0];
  const mando = meu[0] === selUser ? '(casa)' : '(fora)';
  ctx.font = 'bold 14px "Segoe UI",Arial'; ctx.fillStyle = '#ffd166';
  ctx.fillText('Rodada ' + (liga.rodada + 1) + '/' + liga.fixtures.length + ' — ' +
    SELECOES[selUser].n + ' × ' + SELECOES[adv].n + ' ' + mando, W / 2, H - 96);
  botao(20, H - 74, 245, 52, '⚽ JOGAR', () => { jogoPend = { a: selUser, b: adv }; tela = 'uniforme'; }, '#e07b00');
  botao(275, H - 74, 150, 52, '⏩ Simular', () => {
    const [x, y] = simulaJogo(selUser, adv);
    registrarLiga(meu[0] === selUser ? x : y, meu[0] === selUser ? y : x);
  }, '#2a6f4e', 'bold 14px Arial');
  botao(435, H - 74, 90, 52, 'Menu', () => { tela = 'menu'; }, '#555');
}
</script>
