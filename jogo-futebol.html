let actx = null;
function audioInit() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  }
}
function beep(freq, dur, tipo, vol) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = tipo || 'square';
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.08, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}
function somChute()  { beep(160, 0.08, 'square', 0.1); }
function somTromba() { beep(90, 0.15, 'sawtooth', 0.09); }
function somApito()  { beep(2200, 0.35, 'square', 0.06); }
function somApito2() { beep(2200, 0.15, 'square', 0.06); setTimeout(() => beep(2200, 0.4, 'square', 0.06), 220); }
function somGol() {
  [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.07), i * 110));
}
function somTorcida(vol, dur, freq) {
  if (!actx) return;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const srcN = actx.createBufferSource();
  srcN.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = freq || 900;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.001, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(vol, actx.currentTime + dur * 0.25);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  srcN.connect(filt); filt.connect(g); g.connect(actx.destination);
  srcN.start();
}

function posForm(side, k) {
  const f = FORMS[side === 0 && M ? M.formA : '4-3-2'][k];
  return { x: FX0 + f[0] * FWID, y: golDefY(side) + dirDe(side) * f[1] * FLEN };

function novoJog(side, k, info) {

function iniciarPartida(iA, iB) {

  players = [];
  [iA, iB].forEach((idx, side) => {
    const el = elenco(SELECOES[idx]);

function posicionar(saida) {
  for (const p of players) {
    const h = posForm(p.side, p.k);
    p.x = h.x; p.y = h.y; p.vx = 0; p.vy = 0; p.chuteCd = 0.5;
  }
  ball.x = CX; ball.y = CYW; ball.vx = 0; ball.vy = 0; ball.spin = 0;
  ball.dono = null; ball.lastSide = saida; ball.autoGol = null; ball.lastKicker = null;
  offTrap = null;
  // todo mundo no próprio campo na saída de bola
  for (const p of players) {
    if (dirDe(p.side) === -1) p.y = Math.max(p.y, CYW + 40);
    else p.y = Math.min(p.y, CYW - 40);
  }
  const bat = players.find(p => p.side === saida && p.k === 8) ||
              players.find(p => p.side === saida && !p.gk);
  if (bat) { bat.x = CX - 25; bat.y = CYW - dirDe(saida) * 30; }
  M.saida = saida;
}

const keys = {};

const btnChute = { x: W - 78, y: H - 105, r: 46 };
const btnPasse = { x: W - 78, y: H - 218, r: 38 };

addEventListener('keydown', e => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  const k = e.key.toLowerCase();
  keys[k] = true;
  audioInit();

  if (k === 'c') trocaManual = true;
  if (k === 'p' || k === 'escape') toggleTatica();
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function posEvt(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) * W / r.width, y: (cy - r.top) * H / r.height };
}
canvas.addEventListener('mousedown', e => { audioInit(); clique(posEvt(e.clientX, e.clientY)); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); audioInit();
  for (const t of e.changedTouches) {
    const pt = posEvt(t.clientX, t.clientY);
    if (tela !== 'jogo' || (M && M.estado === 'tatica')) { clique(pt); continue; }
    if (pt.y < 54 && pt.x > W - 62) { toggleTatica(); continue; }
    if (Math.hypot(pt.x - btnChute.x, pt.y - btnChute.y) < btnChute.r + 8) { acaoChute = true; continue; }
    if (Math.hypot(pt.x - btnPasse.x, pt.y - btnPasse.y) < btnPasse.r + 8) { acaoPasse = true; continue; }
    if (pt.x < W * 0.55 && !joy.ativo) {
      joy.ativo = true; joy.id = t.identifier; joy.ax = pt.x; joy.ay = pt.y; joy.dx = 0; joy.dy = 0;
    } else { acaoChute = true; }
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) if (joy.ativo && t.identifier === joy.id) {
    const pt = posEvt(t.clientX, t.clientY);
    joy.dx = pt.x - joy.ax; joy.dy = pt.y - joy.ay;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) if (joy.ativo && t.identifier === joy.id) {
    joy.ativo = false; joy.dx = 0; joy.dy = 0;
  }
});
function clique(pt) {
  for (const b of botoes) if (pt.x > b.x && pt.x < b.x + b.w && pt.y > b.y && pt.y < b.y + b.h) { b.cb(); return; }
}

// ---------------- Toques, chutes e impedimento ----------------
function tocou(p) {
  if (offTrap && M.estado === 'play' && offTrap.side === p.side && offTrap.ids.includes(p)) {
    offTrap = null;
    anunciar('IMPEDIMENTO!');
    somApito();
    pararJogo('falta', 1 - p.side, p.x, p.y, true);
    return true;
  }
  offTrap = null;
  ball.lastSide = p.side;
  ball.lastP = p;
  return false;
}

function estariaImpedido(t, side) {
  const d = dirDe(side);
  const opp = players.filter(o => o.side !== side).map(o => o.y).sort((a, b) => d === -1 ? a - b : b - a);
  const seg = opp[1];
  return d === -1 ? (t.y < CYW && t.y < ball.y && t.y < seg)
                  : (t.y > CYW && t.y > ball.y && t.y > seg);
}

function armarImpedimento(p) {
  const ids = players.filter(t => t.side === p.side && t !== p && !t.gk && estariaImpedido(t, p.side));
  offTrap = ids.length ? { side: p.side, ids } : null;
}

function chutar(p, tx, ty, poder, semImped, loft) {
  const d = Math.hypot(tx - ball.x, ty - ball.y) || 1;
  ball.dono = null;
  p.arremesso = false;
  if (tocou(p)) return;
  ball.vx = (tx - ball.x) / d * poder;
  ball.vy = (ty - ball.y) / d * poder;
  ball.vz = loft || 0;
  if (loft) ball.z = Math.max(ball.z, 2);
  p.chuteCd = 0.4; p.wobble = 1;
  if (!semImped) armarImpedimento(p);
  somChute();
  // gol contra só conta quando o chute/toque mira de propósito no próprio gol
  ball.autoGol = (Math.abs(tx - CX) < GW / 2 + 25 && Math.abs(ty - golDefY(p.side)) < 45) ? p : null;
  ball.lastKicker = p;   // quem chutou de fato (mesmo que a bola desvie depois)
  if (M.estado === 'parada') { M.estado = 'play'; M.parada = null; }
}

// cabeceio (gol à frente) ou bicicleta (gol atrás) numa bola alta
function acaoAerea(p, mdx, mdy) {
  const gy = golAtkY(p.side);
  const gdx = CX - p.x, gdy = gy - p.y, gl = Math.hypot(gdx, gdy) || 1;
  const dot = (mdx || mdy) ? (mdx * gdx + mdy * gdy) / (Math.hypot(mdx, mdy) * gl) : 1;
  ball.dono = null;
  ball.autoGol = null;   // cabeceio/bicicleta sempre mira o gol adversário
  ball.lastKicker = p;
  if (tocou(p)) return;
  if (dot < -0.25) {           // BICICLETA!
    p.bike = 0.55; p.chuteCd = 1.1;
    ball.vx = gdx / gl * 560 + (Math.random() - 0.5) * 160;
    ball.vy = gdy / gl * 560 + (Math.random() - 0.5) * 160;
    ball.vz = 150;
    particulas.push({ tipo: 'texto', texto: 'BICICLETA!', x: p.x, y: p.y - 42, vx: 0, vy: -35, vida: 1.2 });
    beep(520, 0.2, 'square', 0.09);
  } else {                     // CABEÇADA
    p.pulo = 0.4; p.chuteCd = 0.6; p.wobble = 1;
    ball.vx = gdx / gl * 470 + (Math.random() - 0.5) * 110;
    ball.vy = gdy / gl * 470 + (Math.random() - 0.5) * 110;
    ball.vz = 60;
    if (Math.random() < 0.4) particulas.push({ tipo: 'texto', texto: 'CABEÇADA!', x: p.x, y: p.y - 42, vx: 0, vy: -35, vida: 1 });
    somChute();
  }
  armarImpedimento(p);
}

function passar(p, semImped) {
  if (Math.hypot(ball.x - p.x, ball.y - p.y) > R + BR + 20 || p.chuteCd > 0) return;
  const ml = Math.hypot(p.vx, p.vy);
  let best = null, bs = -1e9, bd = 0;
  for (const t of players) {
    if (t.side !== p.side || t === p) continue;
    const dx = t.x - p.x, dy = t.y - p.y, d = Math.hypot(dx, dy);
    if (d < 45 || d > 470) continue;
    let s = -d * 0.45 + (p.y - t.y) * -dirDe(p.side) * 0.7;
    if (ml > 15) s += (p.vx * dx + p.vy * dy) / (ml * d) * 220;
    if (s > bs) { bs = s; best = t; bd = d; }
  }
  if (!best) return;
  chutar(p, best.x + best.vx * 0.25, best.y + best.vy * 0.25, 300 + bd * 0.55, semImped);
}

function aiPasse(p, semImped, loft) {
  let best = null, bs = -1e9, bd = 0;
  for (const t of players) {
    if (t.side !== p.side || t === p || t.gk) continue;
    const d = Math.hypot(t.x - p.x, t.y - p.y);
    if (d < 60 || d > 450) continue;
    if (!semImped && estariaImpedido(t, p.side)) continue;
    const s = (p.y - t.y) * -dirDe(p.side) - d * 0.3 + Math.random() * 50;
    if (s > bs) { bs = s; best = t; bd = d; }
  }
  if (best) chutar(p, best.x, best.y, 290 + bd * 0.5, semImped, loft || 0);
  else chutar(p, p.x + (Math.random() - 0.5) * 100, p.y + dirDe(p.side) * 170, 250, true, loft || 0);
}

// ---------------- Jogador humano ----------------
function inputUser(p, dt) {
  let dx = 0, dy = 0;
  if (keys['arrowleft'] || keys['a']) dx -= 1;
  if (keys['arrowright'] || keys['d']) dx += 1;
  if (keys['arrowup'] || keys['w']) dy -= 1;
  if (keys['arrowdown'] || keys['s']) dy += 1;
  let sprint = !!keys['shift'];
  if (joy.ativo) {
    const l = Math.hypot(joy.dx, joy.dy);
    if (l > 10) { dx = joy.dx / l; dy = joy.dy / l; if (l > 62) sprint = true; }
  }
  const l = Math.hypot(dx, dy);
  if (l > 1) { dx /= l; dy /= l; }
  p.correndo = sprint && l > 0 && p.stamina > 0.05;
  let vel = p.correndo ? 292 : 196;
  if (ball.dono === p) vel *= 0.92;   // a bola no pé pesa um pouquinho
  p.vx += (dx * vel - p.vx) * Math.min(1, 10 * dt);
  p.vy += (dy * vel - p.vy) * Math.min(1, 10 * dt);
  if (p.correndo) p.stamina = Math.max(0, p.stamina - 0.4 * dt);
  else p.stamina = Math.min(1, p.stamina + 0.16 * dt);

  const db = Math.hypot(ball.x - p.x, ball.y - p.y);
  const comBola = db < R + BR + 20;

  // bola no ar por perto: ESPAÇO vira cabeceio ou bicicleta
  if (acaoChute && ball.z > 14 && ball.z < 62 && db < 46 && p.chuteCd <= 0) {
    acaoAerea(p, l > 0 ? dx : 0, l > 0 ? dy : 0);
    return;
  }

  // condução colada: dribla com a bola no pé
  if (l > 0 && db < R + BR + 16 && Math.hypot(ball.vx, ball.vy) < 250 && ball.lastSide === 0) {
    ball.vx += (dx * (vel + 60) - ball.vx) * Math.min(1, 5 * dt);
    ball.vy += (dy * (vel + 60) - ball.vy) * Math.min(1, 5 * dt);
  }

  if (acaoChute) {
    if (comBola && p.chuteCd <= 0) {
      const gy = golAtkY(0);
      let tx, ty;
      if (l > 0) {
        const aM = Math.atan2(dy, dx), aG = Math.atan2(gy - ball.y, CX - ball.x);
        let dd = Math.abs(aM - aG); if (dd > Math.PI) dd = 6.2832 - dd;
        if (dd < 0.55) { tx = CX + (Math.random() - 0.5) * 70; ty = gy; } // mira assistida
        else { tx = ball.x + dx * 400; ty = ball.y + dy * 400; }
      } else { tx = CX + (Math.random() - 0.5) * 60; ty = gy; }
      chutar(p, tx, ty, 545, false);
    } else if (!comBola) iniciarCarrinho(p, dx, dy);   // defendendo: carrinho!
  } else if (acaoPasse) {
    if (comBola) passar(p, false);
    else iniciarDesarme(p);                            // defendendo: desarme em pé
  }
}

function iniciarCarrinho(p, dx, dy) {
  if (p.slide > 0 || p.levant > 0 || p.chuteCd > 0) return;
  let l = Math.hypot(dx, dy);
  if (l < 0.1) { dx = ball.x - p.x; dy = ball.y - p.y; l = Math.hypot(dx, dy) || 1; }
  p.slide = 0.18; p.sdx = dx / l; p.sdy = dy / l;
  p.chuteCd = 1.2;
  beep(220, 0.12, 'sawtooth', 0.06);
}

function iniciarDesarme(p) {
  if (p.desarme > 0 || p.slide > 0 || p.levant > 0) return;
  p.desarme = 0.28;
  const d = Math.hypot(ball.x - p.x, ball.y - p.y) || 1;
  p.vx += (ball.x - p.x) / d * 270;
  p.vy += (ball.y - p.y) / d * 270;
}

function cartao(p) {
  p.amarelos++;
  const vermelho = p.amarelos >= 2;
  if (arbitro) {
    arbitro.tx = p.x; arbitro.ty = p.y - 22;
    arbitro.cartaoPend = vermelho ? 'vermelho' : 'amarelo';
    arbitro.alvo = p;
    arbitro.correndo = true;
  }
  if (vermelho) {
    anunciar('EXPULSO! 🟥');
    p.fora = true;
    if (ctrl === p) ctrl = null;
  } else anunciar('CARTÃO AMARELO! 🟨');
}

// falta unificada: aciona o juiz, sorteia cartão pela violência do choque e monta a cobrança
function assinalarFalta(faltoso, vitima, vrel) {
  faltaCd = 7;
  somApito();
  if (arbitro) { arbitro.tx = faltoso.x; arbitro.ty = faltoso.y - 20; arbitro.correndo = true; }
  const prob = clamp((vrel - 300) / 450, 0, 0.9);
  if (Math.random() < prob) cartao(faltoso);
  const gy = golDefY(faltoso.side);
  const naArea = vitima.x > BOXX0 && vitima.x < BOXX1 && Math.abs(vitima.y - gy) < BOX_D;
  if (naArea) iniciarPenalti(vitima.side);
  else { anunciar('FALTA!'); pararJogo('falta', vitima.side, vitima.x, vitima.y, true); }
}

// ---------------- Juiz gordinho ----------------
function updateArbitro(dt) {
  if (!arbitro) return;
  if (arbitro.cartaoT > 0) {
    arbitro.cartaoT -= dt;
    if (arbitro.cartaoT <= 0) { arbitro.cartaoPend = null; arbitro.corCartao = null; arbitro.alvo = null; }
    return;
  }
  if (!arbitro.correndo) { arbitro.tx = ball.x; arbitro.ty = ball.y; }
  const dx = arbitro.tx - arbitro.x, dy = arbitro.ty - arbitro.y, dl = Math.hypot(dx, dy) || 1;
  const vel = arbitro.correndo ? 195 : 140;
  const f = Math.min(1, dl / 40);
  arbitro.vx += (dx / dl * vel * f - arbitro.vx) * Math.min(1, 6 * dt);
  arbitro.vy += (dy / dl * vel * f - arbitro.vy) * Math.min(1, 6 * dt);
  arbitro.x = clamp(arbitro.x + arbitro.vx * dt, FX0 + 12, FX1 - 12);
  arbitro.y = clamp(arbitro.y + arbitro.vy * dt, FY0 + 12, FY1 - 12);
  arbitro.fase = (arbitro.fase || 0) + Math.hypot(arbitro.vx, arbitro.vy) * dt * 0.06;
  if (arbitro.correndo && dl < 26) {
    arbitro.correndo = false;
    if (arbitro.cartaoPend) { arbitro.cartaoT = 1.3; arbitro.corCartao = arbitro.cartaoPend; somApito(); }
  }
}

// ---------------- IA de linha ----------------
function perseguidor(side) {
  let best = null, bd = 1e9;
  for (const p of players) {
    if (p.side !== side || p.gk || p === ctrl) continue;
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < bd) { bd = d; best = p; }
  }
  return best;
}

function aiLinha(p, dt) {
  const d = dirDe(p.side);
  const cpu = p.side === 1;
  const vel = (cpu ? DIF[dif].vel : 172) * M.mult[p.side];
  p.ruidoT -= dt;
  if (p.ruidoT <= 0) { p.ruidoT = 0.6 + Math.random(); p.rx = (Math.random() - 0.5) * 55; p.ry = (Math.random() - 0.5) * 55; }

  const per = perseguidor(p.side);
  const db = Math.hypot(ball.x - p.x, ball.y - p.y);
  const golY = golAtkY(p.side);
  const fm = M.mult[p.side];
  let tx, ty;

  const defendendo = dirDe(p.side) === -1 ? ball.y > CYW + 100 : ball.y < CYW - 100;
  if (p === per && (cpu || db < 330 || defendendo)) {
    // carrinho da IA quando o adversário domina a bola por perto
    if (cpu && db < 55 && ball.lastSide !== p.side && p.slide <= 0 && p.levant <= 0 &&
        Math.random() < (0.05 + dif * 0.05) * dt) {
      iniciarCarrinho(p, ball.x - p.x, ball.y - p.y);
      return;
    }
    const comBola = ball.dono === p || (db < R + BR + 12 && ball.lastSide === p.side);
    if (comBola) {
      // com a bola no pé: conduz SEMPRE rumo ao gol de ataque (com ginga)
      const distMeuGol = Math.abs(golDefY(p.side) - p.y);
      if (distMeuGol < 140 && p.chuteCd <= 0) {   // encurralado: chutão de alívio
        chutar(p, FX0 + 60 + Math.random() * (FWID - 120), p.y + dirDe(p.side) * 320, 520, true, 160);
        return;
      }
      tx = clamp(p.x + (CX - p.x) * 0.25 + p.rx, FX0 + R, FX1 - R);
      ty = golY;
    } else {
      // bola solta: posiciona-se atrás dela em relação ao gol
      const gdx = CX - ball.x, gdy = golY - ball.y, gl = Math.hypot(gdx, gdy) || 1;
      tx = ball.x - gdx / gl * 6 + p.rx * 0.25;
      ty = ball.y - gdy / gl * 6;
    }
    // cabeceio/bicicleta da IA em bola alta
    if (ball.z > 14 && ball.z < 62 && db < 44 && p.chuteCd <= 0) {
      acaoAerea(p, ball.x - p.x, ball.y - p.y);
      return;
    }
    if (db < R + BR + 9 && p.chuteCd <= 0) {
      const dg = Math.abs(golY - p.y);
      if (dg < 330) {
        const alvo = GX0 + 15 + Math.random() * (GW - 30) + (Math.random() - 0.5) * DIF[dif].erro * (cpu ? 2 - fm : 0.5);
        chutar(p, alvo, golY, DIF[dif].chute + Math.random() * 60, false, dg > 220 ? 110 : 0);
      } else if (Math.random() < 0.45) aiPasse(p, false, 0);
      else if (ball.dono !== p) chutar(p, p.x + (Math.random() - 0.5) * 130, p.y + d * 190, 245, true);
    }
  } else {
    const h = posForm(p.side, p.k);
    tx = h.x + (ball.x - CX) * 0.22 + p.rx;
    ty = h.y + (ball.y - CYW) * 0.3 + p.ry;
    if (p.k >= 1 && p.k <= 4) {
      let m = null, md = 150;
      for (const o of players) {
        if (o.side === p.side || o.gk) continue;
        const dd = Math.hypot(o.x - p.x, o.y - p.y);
        if (dd < md) { md = dd; m = o; }
      }
      if (m) { tx = (tx + m.x) / 2; ty = (ty + m.y) / 2; }
    }
  }
  const ddx = tx - p.x, ddy = ty - p.y, dl = Math.hypot(ddx, ddy) || 1;
  const f = Math.min(1, dl / 50);
  p.vx += (ddx / dl * vel * f - p.vx) * Math.min(1, 6 * dt);
  p.vy += (ddy / dl * vel * f - p.vy) * Math.min(1, 6 * dt);
}

// ---------------- Goleiro ágil ----------------
function aiGoleiro(p, dt) {
  if (p.mergulho > 0) return;   // voando, sem novo comando
  const linhaY = golDefY(p.side) + dirDe(p.side) * 14;
  if (ball.dono === p) {
    p.holdT -= dt;
    ball.x = p.x; ball.y = p.y + dirDe(p.side) * (R + BR);
    ball.vx = 0; ball.vy = 0;
    // sai jogando: caminha com a bola até a entrada da área
    const alvoY = golDefY(p.side) + dirDe(p.side) * (BOX_D - 25);
    const alvoX = clamp(CX + (p.x - CX) * 0.4, BOXX0 + 40, BOXX1 - 40);
    const ddx = alvoX - p.x, ddy = alvoY - p.y, ddl = Math.hypot(ddx, ddy);
    if (ddl > 14) { p.vx = ddx / ddl * 150; p.vy = ddy / ddl * 150; p.fase += 9 * dt; }
    else { p.vx *= 0.8; p.vy *= 0.8; }
    if (p.holdT <= 0 || ddl <= 14) {
      anunciar('CHUTÃO!');
      chutar(p, FX0 + 70 + Math.random() * (FWID - 140), p.y + dirDe(p.side) * FLEN * 0.55, 640, false, 300);
    }
    return;
  }
  const vindo = dirDe(p.side) === -1 ? ball.vy > 70 : ball.vy < -70;
  const distGol = Math.abs(ball.y - golDefY(p.side));
  const vBola = Math.hypot(ball.vx, ball.vy);
  let tx, ty, vel;
  // a bola cruzaria a linha dentro do gol? (senão, nada de mergulho à toa)
  const tAr = Math.abs((linhaY - ball.y) / (ball.vy || 1));
  const ix = ball.x + ball.vx * tAr;
  // só arrisca o salto se a bola já estiver dentro/perto da PEQUENA área
  const rumoAoGol = !ball.dono && vindo && vBola > 330 && tAr < 0.4 && ix > GX0 - 16 && ix < GX1 + 16;
  if (rumoAoGol && distGol < 140) {
    tx = clamp(ix, GX0 + 8, GX1 - 8);
    ty = linhaY;
    vel = DIF[dif].gkVel * M.mult[p.side];
    // desvio lateral grande: SALTA de mão esticada!
    if (Math.abs(tx - p.x) > 40 && p.levant <= 0 && p.mergulhoCd <= 0) {
      p.mergulho = 0.24; p.mergulhoCd = 1.4;   // saltinho curto de barriga
      p.sdx = Math.sign(tx - p.x); p.sdy = 0;
      p.vx = p.sdx * DIF[dif].gkVel; p.vy = 0;
      return;
    }
  } else if (distGol < BOX_D && Math.hypot(ball.x - p.x, ball.y - p.y) < 160 && ball.x > BOXX0 && ball.x < BOXX1) {
    tx = ball.x; ty = ball.y; vel = DIF[dif].gkVel * 0.75;
  } else {
    tx = clamp(ball.x, GX0 + 12, GX1 - 12); ty = linhaY; vel = 175;
  }
  const dx = tx - p.x, dy = ty - p.y, dl = Math.hypot(dx, dy) || 1;
  const f = Math.min(1, dl / 30);
  p.vx += (dx / dl * vel * f - p.vx) * Math.min(1, 8 * dt);
  p.vy += (dy / dl * vel * f - p.vy) * Math.min(1, 8 * dt);
}

// ---------------- Física ----------------
function fisicaJogador(p, dt) {
  p.chuteCd -= dt;
  if (p.slide > 0) {           // deslizando no carrinho
    p.slide -= dt;
    p.vx = p.sdx * 260; p.vy = p.sdy * 260;
    if (Math.random() < 22 * dt) particulas.push({ tipo: 'grama', x: p.x - p.sdx * 14,
      y: p.y + 8, vx: (Math.random() - 0.5) * 60, vy: -50, vida: 0.5 });
    if (p.slide <= 0) p.levant = 0.4;
  } else if (p.levant > 0) {   // levantando do chão
    p.levant -= dt;
    p.vx *= 0.72; p.vy *= 0.72;
  }
  p.mergulhoCd = Math.max(0, (p.mergulhoCd || 0) - dt);
  if (p.mergulho > 0) {        // voo lateral do goleiro
    p.mergulho -= dt;
    p.vx = p.sdx * DIF[dif].gkVel;
    p.vy = p.sdy * DIF[dif].gkVel;
    if (p.mergulho <= 0) {     // BARRIGADA no chão!
      p.levant = 0.5;
      p.wobble = 1;
      p.vx = 0; p.vy = 0;
      somTromba();
      for (let i = 0; i < 5; i++) particulas.push({ tipo: 'grama',
        x: p.x + (Math.random() - 0.5) * 26, y: p.y + 8,
        vx: (Math.random() - 0.5) * 80, vy: -50, vida: 0.5 });
      if (Math.random() < 0.5) particulas.push({ tipo: 'texto', texto: 'PLOFT!',
        x: p.x, y: p.y - 34, vx: 0, vy: -30, vida: 0.9 });
    }
  }
  p.pulo = Math.max(0, p.pulo - dt);
  if (p.bike > 0) {            // girando na bicicleta
    p.bike -= dt;
    p.vx *= 0.9; p.vy *= 0.9;
    if (p.bike <= 0) p.levant = 0.45;
  }
  if (p.desarme > 0) {         // bote do desarme em pé
    p.desarme -= dt;
    const dd = Math.hypot(ball.x - p.x, ball.y - p.y);
    const roubavel = !ball.dono || (!ball.dono.gk && ball.dono.side !== p.side);
    if (dd < R + BR + 12 && ball.lastSide !== p.side && roubavel && ball.z < 20) {
      ball.dono = null;
      const nx = (ball.x - p.x) / (dd || 1), ny = (ball.y - p.y) / (dd || 1);
      ball.vx = nx * 250 + (Math.random() - 0.5) * 130;
      ball.vy = ny * 250 + (Math.random() - 0.5) * 130;
      tocou(p); somChute(); p.desarme = 0;
    }
  }
  p.x += p.vx * dt; p.y += p.vy * dt;
  p.x = clamp(p.x, FX0 + R, FX1 - R);
  if (p.gk) {
    const gy = golDefY(p.side);
    p.y = dirDe(p.side) === -1 ? clamp(p.y, gy - BOX_D - 20, gy - 4) : clamp(p.y, gy + 4, gy + BOX_D + 20);
    // no mergulho, fica preso à frente do gol
    if (p.mergulho > 0 || p.levant > 0) p.x = clamp(p.x, GX0 - 8, GX1 + 8);
  } else p.y = clamp(p.y, FY0 + R, FY1 - R);
  const v = Math.hypot(p.vx, p.vy);
  p.fase += v * dt * 0.06;
  p.wobble = Math.max(0, p.wobble - 2.5 * dt);
  if (p === ctrl && p.stamina < 0.3 && v > 60 && Math.random() < 8 * dt)
    particulas.push({ tipo: 'suor', x: p.x + (Math.random() - 0.5) * 20, y: p.y - 30, vx: (Math.random() - 0.5) * 40, vy: -60, vida: 0.6 });
}

function colisaoJogadores(dt) {
  faltaCd -= dt;
  for (let i = 0; i < players.length; i++) for (let j = i + 1; j < players.length; j++) {
    const a = players[i], b = players[j];
    const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 0.01, min = R * 2;
    // carrinho acertando alguém
    const sl = a.slide > 0 ? a : (b.slide > 0 ? b : null);
    if (sl && d < min + 8) {
      const alvo = sl === a ? b : a;
      if (alvo.side !== sl.side && alvo.slide <= 0) {
        const alvoTemBola = Math.hypot(ball.x - alvo.x, ball.y - alvo.y) < R + BR + 16;
        alvo.wobble = 1; alvo.vx += sl.vx * 0.5; alvo.vy += sl.vy * 0.5;
        sl.slide = 0; sl.levant = 0.6;
        somTromba();
        if (alvoTemBola && Math.random() < 0.75) {
          // desarme limpo: bola roubada no carrinho
          ball.dono = null;
          ball.vx = sl.sdx * 360 + (Math.random() - 0.5) * 100;
          ball.vy = sl.sdy * 360 + (Math.random() - 0.5) * 100;
          tocou(sl);
        } else if (M.estado === 'play' && faltaCd <= 0) {
          assinalarFalta(sl, alvo, 420);   // carrinho perdido: falta de peso médio-alto
        }
        continue;
      }
    }
    if (d >= min) continue;
    const nx = dx / d, ny = dy / d, emp = (min - d) / 2;
    a.x -= nx * emp; a.y -= ny * emp; b.x += nx * emp; b.y += ny * emp;
    const vrel = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (vrel <= 0) continue;
    const imp = vrel * 0.9;
    a.vx -= nx * imp; a.vy -= ny * imp; b.vx += nx * imp; b.vy += ny * imp;
    if (vrel > 230) {
      a.wobble = 1; b.wobble = 1; somTromba();
      // trombada forte: quem dominava perde a bola
      if (a.side !== b.side && (ball.dono === a || ball.dono === b)) {
        ball.dono = null;
        ball.vx = (ball.x - (a.x + b.x) / 2) * 6 + (Math.random() - 0.5) * 150;
        ball.vy = (ball.y - (a.y + b.y) / 2) * 6 + (Math.random() - 0.5) * 150;
      }
      particulas.push({ tipo: 'texto', texto: FRASES_TROMBADA[Math.floor(Math.random() * FRASES_TROMBADA.length)],
        x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 - 40, vx: 0, vy: -35, vida: 1 });
      if (a.side !== b.side && vrel > 300 && faltaCd <= 0 && M.estado === 'play' && Math.random() < 0.33) {
        const faltoso = Math.hypot(a.vx, a.vy) > Math.hypot(b.vx, b.vy) ? a : b;
        const vitima = faltoso === a ? b : a;
        assinalarFalta(faltoso, vitima, vrel);   // cartão escala com a violência do choque
      }
    }
  }
}

function fisicaBola(dt) {
  if (ball.dono) {
    const p = ball.dono;
    if (!p.gk) {                 // domínio: bola presa no pé
      const v2 = Math.hypot(p.vx, p.vy);
      const dx2 = v2 > 20 ? p.vx / v2 : 0, dy2 = v2 > 20 ? p.vy / v2 : dirDe(p.side);
      ball.x = p.x + dx2 * (R + BR - 3);
      ball.y = p.y + dy2 * (R + BR - 3);
      ball.z = 0; ball.vz = 0;
      ball.vx = p.vx; ball.vy = p.vy;
      ball.spin += v2 * dt * 0.06;
      for (const o of players) { // marcador colado consegue dar um bico
        if (o.side === p.side || o.gk) continue;
        const dd = Math.hypot(o.x - ball.x, o.y - ball.y);
        if (dd < R + BR + 6 && Math.random() < (0.3 + dif * 0.25) * dt) {
          ball.dono = null;
          ball.vx = (ball.x - o.x) * 9 + (Math.random() - 0.5) * 170;
          ball.vy = (ball.y - o.y) * 9 + (Math.random() - 0.5) * 170;
          tocou(o);
          break;
        }
      }
    }
    return;
  }
  ball.x += ball.vx * dt; ball.y += ball.vy * dt;
  // altura (cruzamentos, chutões, cabeceios)
  if (ball.z > 0 || ball.vz > 0) {
    ball.z += ball.vz * dt;
    ball.vz -= 620 * dt;
    if (ball.z <= 0) { ball.z = 0; ball.vz = ball.vz < -80 ? -ball.vz * 0.45 : 0; }
  }
  const fric = Math.max(0, 1 - (ball.z > 4 ? 0.15 : 0.7) * dt);
  ball.vx *= fric; ball.vy *= fric;
  ball.spin += ball.vy * dt * 0.05;

  const naBoca = ball.x > GX0 && ball.x < GX1;
  const topo = golAtkY(0) === FY0 ? 0 : 1;  // quem ataca o gol de cima
  // GOL (só abaixo do travessão!)
  if (naBoca && ball.z < 42 && M.estado !== 'gol') {
    if (ball.y < FY0 - BR) { gol(topo); return; }
    if (ball.y > FY1 + BR) { gol(1 - topo); return; }
  }
  // fundo da rede
  if (naBoca) {
    if (ball.y < FY0 - GDEPTH + BR) { ball.y = FY0 - GDEPTH + BR; ball.vy = Math.abs(ball.vy) * 0.3; }
    if (ball.y > FY1 + GDEPTH - BR) { ball.y = FY1 + GDEPTH - BR; ball.vy = -Math.abs(ball.vy) * 0.3; }
  }
  if (M.estado === 'play') {
    // lateral
    if (ball.x < FX0 - BR || ball.x > FX1 + BR) {
      const lado = 1 - ball.lastSide;
      anunciar('LATERAL');
      pararJogo('lateral', lado, ball.x < CX ? FX0 + 4 : FX1 - 4, clamp(ball.y, FY0 + 30, FY1 - 30));
      return;
    }
    // linha de fundo (topo = ataca o gol de cima; defende-o o outro time)
    const pertoDaTrave = ball.x > GX0 - 75 && ball.x < GX1 + 75;
    if ((ball.y < FY0 - BR || ball.y > FY1 + BR) && pertoDaTrave && Math.hypot(ball.vx, ball.vy) > 250)
      somTorcida(0.13, 0.9, 750);   // UUUH da torcida no quase-gol
    if (!naBoca && ball.y < FY0 - BR) {
      if (ball.lastSide === topo) { anunciar('TIRO DE META'); pararJogo('meta', 1 - topo, CX + (ball.x < CX ? -55 : 55), FY0 + 35); }
      else { anunciar('ESCANTEIO'); pararJogo('escanteio', topo, ball.x < CX ? FX0 + 12 : FX1 - 12, FY0 + 12); }
      return;
    }
    if (!naBoca && ball.y > FY1 + BR) {
      if (ball.lastSide === 1 - topo) { anunciar('TIRO DE META'); pararJogo('meta', topo, CX + (ball.x < CX ? -55 : 55), FY1 - 35); }
      else { anunciar('ESCANTEIO'); pararJogo('escanteio', 1 - topo, ball.x < CX ? FX0 + 12 : FX1 - 12, FY1 - 12); }
      return;
    }
  } else {
    ball.x = clamp(ball.x, FX0 + BR, FX1 - BR);
    if (!naBoca) ball.y = clamp(ball.y, FY0 + BR, FY1 - BR);
  }
  // toque bola x jogadores
  for (const p of players) {
    if (M.estado === 'penalti' && M.pen && p !== M.pen.gk && p !== M.pen.taker) continue;
    if (ball.z > (p.gk ? 55 : 26)) continue;   // bola alta passa por cima
    const rr = raio(p) + BR;
    const dx = ball.x - p.x, dy = ball.y - p.y, d = Math.hypot(dx, dy);
    if (d >= rr) continue;
    const nx = dx / (d || 0.01), ny = dy / (d || 0.01);
    const vBola = Math.hypot(ball.vx, ball.vy);
    // domínio: recepção do próprio time (mata no peito) ou bola lenta de qualquer um
    if (!p.gk && M.estado === 'play' && ball.z < 14 && p.slide <= 0 &&
        vBola < (p.side === ball.lastSide ? 460 : 250)) {
      if (!tocou(p)) ball.dono = p;
      return;
    }
    if (p.gk && vBola < 195 && ball.z < 50 && ball.dono === null && Math.abs(ball.y - golDefY(p.side)) < BOX_D + 30) {
      if (!tocou(p)) {
        ball.dono = p; p.holdT = 2.2; ball.vx = 0; ball.vy = 0;
        anunciar('SEGUROU!');
        somTorcida(0.1, 0.8, 700);
      }
      return;
    }
    ball.x = p.x + nx * rr; ball.y = p.y + ny * rr;
    const vAlong = ball.vx * nx + ball.vy * ny;
    if (vAlong < 0) { ball.vx -= 1.65 * vAlong * nx; ball.vy -= 1.65 * vAlong * ny; }
    ball.vx += p.vx * 0.5; ball.vy += p.vy * 0.5;
    const s = Math.hypot(ball.vx, ball.vy);
    if (s < 120) { ball.vx += nx * (120 - s); ball.vy += ny * (120 - s); }
    if (p.gk && vBola > 300) { p.wobble = 1; somTromba(); }
    tocou(p);
    return;
  }
}

// ---------------- Regras: paradas, gol, pênalti ----------------
function pararJogo(tipo, side, x, y, jaAnunciado) {
  ball.x = clamp(x, FX0 + 4, FX1 - 4); ball.y = clamp(y, FY0 + 8, FY1 - 8);
  ball.vx = 0; ball.vy = 0; ball.dono = null;
  offTrap = null;
  let taker;
  if (tipo === 'meta') taker = players.find(p => p.side === side && p.gk);
  else {
    let bd = 1e9;
    for (const p of players) if (p.side === side && !p.gk) {
      const d = Math.hypot(ball.x - p.x, ball.y - p.y);
      if (d < bd) { bd = d; taker = p; }
    }
  }
  if (side === 0 && !taker.gk) ctrl = taker;
  M.estado = 'parada';
  M.parada = { tipo, side, taker, timer: 0, px: ball.x, py: ball.y };
  taker.arremesso = tipo === 'lateral';
  if (tipo === 'falta') {
    // falta ensaiada com barreira: só pertinho da área
    const distGol = Math.hypot(CX - ball.x, golAtkY(side) - ball.y);
    if (distGol < 300) {
      M.parada.ensaiada = true;
      M.parada.mira = CX;
      M.parada.loft = 190;
      M.parada.barreira = players.filter(o => o.side !== side && !o.gk)
        .sort((x1, x2) => Math.hypot(x1.x - ball.x, x1.y - ball.y) - Math.hypot(x2.x - ball.x, x2.y - ball.y))
        .slice(0, 3);
    } else {
      M.parada.mira = CX;
      M.parada.loft = 150;
    }
  } else if (tipo === 'meta') {
    M.parada.mira = CX;
    M.parada.loft = 260;
  } else if (tipo === 'lateral') {
    M.parada.mira = clamp(ball.x + (ball.x < CX ? 110 : -110), FX0 + 20, FX1 - 20);
    M.parada.loft = 90;
  }
}

function updateParada(dt) {
  const pa = M.parada; pa.timer += dt;
  const t = pa.taker;
  const gyA = golAtkY(pa.side);
  // barreira na falta ensaiada
  if (pa.barreira) {
    const ang = Math.atan2(gyA - ball.y, CX - ball.x);
    const bx = ball.x + Math.cos(ang) * 95, by = ball.y + Math.sin(ang) * 95;
    const px2 = -Math.sin(ang), py2 = Math.cos(ang);
    pa.barreira.forEach((o, i) => {
      if (o.fora) return;
      const off = (i - (pa.barreira.length - 1) / 2) * (R * 2 + 2);
      o.x += (clamp(bx + px2 * off, FX0 + R, FX1 - R) - o.x) * Math.min(1, 6 * dt);
      o.y += (clamp(by + py2 * off, FY0 + R, FY1 - R) - o.y) * Math.min(1, 6 * dt);
      o.vx = 0; o.vy = 0;
      o.fase += 8 * dt;
      o.wobble = Math.max(o.wobble, 0.3 + 0.2 * Math.sin(clock * 9 + i)); // nervosos
    });
  }
  // afasta adversários (menos a barreira)
  for (const o of players) {
    if (o.side === pa.side || (pa.barreira && pa.barreira.includes(o))) continue;
    const d = Math.hypot(o.x - ball.x, o.y - ball.y);
    if (d < 105) {
      const nx = (o.x - ball.x) / (d || 1), ny = (o.y - ball.y) / (d || 1);
      o.x = clamp(o.x + nx * 130 * dt, FX0 + R, FX1 - R);
      o.y = clamp(o.y + ny * 130 * dt, FY0 + R, FY1 - R);
    }
  }
  // demais voltam pra formação
  for (const p of players) {
    if (p === t || (pa.barreira && pa.barreira.includes(p))) continue;
    const h = posForm(p.side, p.k);
    const tx = h.x + (ball.x - CX) * 0.15, ty = h.y + (ball.y - CYW) * 0.2;
    const dx = tx - p.x, dy = ty - p.y, dl = Math.hypot(dx, dy) || 1;
    const f = Math.min(1, dl / 60);
    p.vx = dx / dl * 130 * f; p.vy = dy / dl * 130 * f;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.fase += Math.hypot(p.vx, p.vy) * dt * 0.06;
  }
  // cobrador vai até o ponto fixo da cobrança
  const sx = pa.px, sy = pa.py - dirDe(pa.side) * (R + BR + (pa.ensaiada ? 16 : 2));
  const dx = sx - t.x, dy = sy - t.y, dl = Math.hypot(dx, dy);
  if (dl > 6) {
    t.vx = dx / dl * 210; t.vy = dy / dl * 210;
    t.x += t.vx * dt; t.y += t.vy * dt;
    t.fase += 12 * dt;
    return;
  }
  t.vx = 0; t.vy = 0;
  // lateral: bola erguida acima da cabeça, nas mãos
  if (pa.tipo === 'lateral') { ball.x = t.x; ball.y = t.y - 5; ball.z = 32; ball.vz = 0; }
  const semImped = pa.tipo !== 'falta';
  const cruzX = CX + (Math.random() - 0.5) * 120;
  const cruzY = gyA + (gyA === FY0 ? 95 : -95);

  if (pa.ensaiada) {           // falta ensaiada: mira, altura e barreira
    if (pa.side === 1) {
      if (pa.timer > 1.8) chutar(t, GX0 + 14 + Math.random() * (GW - 28), gyA, 500, false, 150 + Math.random() * 90);
    } else {
      if (keys['arrowleft'] || keys['a']) pa.mira -= 150 * dt;
      if (keys['arrowright'] || keys['d']) pa.mira += 150 * dt;
      if (keys['arrowup'] || keys['w']) pa.loft += 180 * dt;
      if (keys['arrowdown'] || keys['s']) pa.loft -= 180 * dt;
      if (joy.ativo) pa.mira = CX + clamp(joy.dx / 55, -1, 1) * (GW / 2 + 26);
      pa.mira = clamp(pa.mira, GX0 - 26, GX1 + 26);
      pa.loft = clamp(pa.loft, 60, 300);
      if (acaoChute) chutar(t, pa.mira, gyA, 500, false, pa.loft);
      else if (acaoPasse) passar(t, false);
    }
    return;
  }

  // lateral do usuário: mira livre antes de arremessar
  if (pa.tipo === 'lateral' && pa.side === 0) {
    if (keys['arrowleft'] || keys['a']) pa.mira -= 170 * dt;
    if (keys['arrowright'] || keys['d']) pa.mira += 170 * dt;
    if (keys['arrowup'] || keys['w']) pa.loft += 160 * dt;
    if (keys['arrowdown'] || keys['s']) pa.loft -= 160 * dt;
    if (joy.ativo) pa.mira = pa.px + clamp(joy.dx / 55, -1, 1) * 150;
    pa.mira = clamp(pa.mira, FX0 + 20, FX1 - 20);
    pa.loft = clamp(pa.loft, 0, 220);
    if (acaoChute) chutar(t, pa.mira, pa.py + dirDe(pa.side) * 180, 380, semImped, pa.loft);
    else if (acaoPasse) passar(t, semImped);
    return;
  }

  // tiro de meta / falta simples do usuário: mira livre em X + altura
  if (pa.side === 0 && (pa.tipo === 'meta' || pa.tipo === 'falta')) {
    if (keys['arrowleft'] || keys['a']) pa.mira -= 200 * dt;
    if (keys['arrowright'] || keys['d']) pa.mira += 200 * dt;
    if (keys['arrowup'] || keys['w']) pa.loft += 180 * dt;
    if (keys['arrowdown'] || keys['s']) pa.loft -= 180 * dt;
    if (joy.ativo) pa.mira = CX + clamp(joy.dx / 55, -1, 1) * (FWID / 2 - 40);
    pa.mira = clamp(pa.mira, FX0 + 30, FX1 - 30);
    pa.loft = clamp(pa.loft, 60, 320);
    if (acaoChute) chutar(t, pa.mira, gyA, pa.tipo === 'meta' ? 620 : 530, semImped, pa.loft);
    else if (acaoPasse) passar(t, semImped);
    return;
  }

  if (pa.side === 1) {
    if (pa.timer > 1.1) {
      if (pa.tipo === 'meta') chutar(t, FX0 + 70 + Math.random() * (FWID - 140), CYW + dirDe(pa.side) * 100, 620, semImped, 280);
      else if (pa.tipo === 'escanteio') chutar(t, cruzX, cruzY, 430, semImped, 240);
      else aiPasse(t, semImped, pa.tipo === 'lateral' ? 130 : 0);
    }
  } else {
    // só sobra o escanteio do usuário aqui (lateral/meta/falta já retornaram acima)
    if (acaoChute) chutar(t, cruzX, cruzY, 430, semImped, 240);
    else if (acaoPasse) {
      const guarda = ctrl;
      passar(t, semImped);
      if (M.estado === 'parada' && pa.timer > 0.4) aiPasse(t, semImped, 0);
      ctrl = guarda;
    }
  }
}

function gol(side) {
  if (M.disputa && M.pen && M.pen.disp) { resolveDisputa(true); return; }
  M.placar[side]++;
  const tocouUltimo = ball.lastP && !ball.lastP.fora ? ball.lastP : null;
  const chutouUltimo = ball.lastKicker && !ball.lastKicker.fora ? ball.lastKicker : null;
  // gol contra só quando o próprio jogador/goleiro chutou ou cabeceou para o seu gol;
  // um desvio/defesa mal-sucedida no goleiro NÃO conta como gol contra
  M.golContra = ball.autoGol && !ball.autoGol.fora && ball.autoGol.side !== side ? ball.autoGol : null;
  // autor do gol: quem tocou por último (se do time que marcou); senão, quem chutou
  // por último (cobre o caso de a bola desviar no goleiro antes de entrar)
  M.autor = M.golContra ? null :
    (tocouUltimo && tocouUltimo.side === side ? tocouUltimo :
     (chutouUltimo && chutouUltimo.side === side ? chutouUltimo : null));
  if (M.autor) M.autor.comendo = 3;
  M.fraseGol = M.golContra ? 'GOL CONTRA!' : FRASES_GOL[Math.floor(Math.random() * FRASES_GOL.length)];
  M.estado = 'gol'; M.golTimer = 3; M.saida = 1 - side; M.pen = null;
  M.replay = replayBuf.slice(); M.replayIdx = 0; M.replayTimer = 0;
  somGol();
  somTorcida(0.28, 2.4, 1100);   // estádio explode
  explodirFesta(90);
}

// confete (e, na festa do título, lanche caindo do céu!)
function explodirFesta(n, comida) {
  const cores = ['#ffd166', '#ef476f', '#06d6a0', '#118ab2', '#f78c6b'];
  const alimentos = ['🍔', '🍟', '🍦', '🍕', '🥤'];
  for (let i = 0; i < n; i++) {
    const item = { x: Math.random() * W, y: -20 - Math.random() * 260,
      vx: (Math.random() - 0.5) * 60, vy: 120 + Math.random() * 170,
      rot: Math.random() * 6.28, vida: 3.4 };
    if (comida && Math.random() < 0.4) item.emoji = alimentos[Math.floor(Math.random() * alimentos.length)];
    else item.cor = cores[i % cores.length];
    confetes.push(item);
  }
}

function drawConfetes() {
  for (const cf of confetes) {
    ctx.save(); ctx.translate(cf.x, cf.y); ctx.rotate(cf.rot);
    if (cf.emoji) { ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText(cf.emoji, 0, 0); }
    else { ctx.fillStyle = cf.cor; ctx.fillRect(-4, -2, 8, 4); }
    ctx.restore();
  }
}

function iniciarPenalti(atk, disp) {
  const defSide = 1 - atk;
  const golY = golDefY(defSide);
  const spotY = golY + dirDe(defSide) * PEN_DIST;
  ball.x = CX; ball.y = spotY; ball.vx = 0; ball.vy = 0; ball.dono = null;
  offTrap = null;
  const taker = players.find(p => p.side === atk && p.k === 9) ||
                players.find(p => p.side === atk && !p.gk);
  taker.x = CX - 6; taker.y = spotY - dirDe(atk) * 46; taker.vx = 0; taker.vy = 0;
  const gk = players.find(p => p.side === defSide && p.gk);
  gk.x = CX; gk.y = golY + dirDe(defSide) * 10; gk.vx = 0; gk.vy = 0;
  // tira os outros da área
  for (const p of players) {
    if (p === taker || p === gk) continue;
    if (p.x > BOXX0 - 20 && p.x < BOXX1 + 20 && Math.abs(p.y - golY) < BOX_D + 30)
      p.y = golY + dirDe(defSide) * (BOX_D + 60 + Math.random() * 60);
  }
  M.estado = 'penalti';
  M.pen = { atk, fase: 'prep', timer: 0, mira: CX, taker, gk, disp: !!disp, escolha: 0 };
  if (!disp) anunciar('PÊNALTI!');
}

function updatePenalti(dt) {
  const pe = M.pen; if (!pe) return;
  pe.timer += dt;
  if (pe.fase === 'prep') {
    if (pe.atk === 0) {
      if (keys['arrowleft'] || keys['a']) pe.mira -= 160 * dt;
      if (keys['arrowright'] || keys['d']) pe.mira += 160 * dt;
      if (joy.ativo) pe.mira = CX + clamp(joy.dx / 55, -1, 1) * (GW / 2 - 14);
      pe.mira = clamp(pe.mira, GX0 + 12, GX1 - 12);
      if (acaoChute) cobraPenalti();
    } else {
      if (pe.disp) {   // escolha o canto do seu goleiro!
        if (keys['arrowleft'] || keys['a']) pe.escolha = -1;
        if (keys['arrowright'] || keys['d']) pe.escolha = 1;
        if (joy.ativo && Math.abs(joy.dx) > 20) pe.escolha = Math.sign(joy.dx);
      }
      if (pe.timer > (pe.disp ? 2.3 : 1.3)) {
        pe.mira = GX0 + 14 + Math.random() * (GW - 28);
        cobraPenalti();
      }
    }
  } else {
    const gk = pe.gk;
    gk.x = clamp(gk.x + gk.vx * dt, GX0 - 6, GX1 + 6);
    gk.vx *= Math.max(0, 1 - 1.5 * dt);
    if (gk.mergulho > 0) { gk.mergulho -= dt; if (gk.mergulho <= 0) gk.levant = 0.4; }
    fisicaBola(dt);
    if (pe.timer > 1.6 && M.estado === 'penalti') {
      if (pe.disp) resolveDisputa(false);
      else { M.pen = null; M.estado = 'play'; }
    }
  }
}

function cobraPenalti() {
  const pe = M.pen;
  const golY = golAtkY(pe.atk);
  let alvo = pe.mira;
  if (pe.atk === 1) alvo += (Math.random() - 0.5) * (190 - DIF[dif].penCpu * 170);
  else alvo += (Math.random() - 0.5) * 26;
  const gk = pe.gk;
  const ladoBola = alvo < CX ? -1 : 1;
  let lado;
  if (pe.atk === 1 && pe.disp && pe.escolha) lado = pe.escolha;   // canto escolhido pelo jogador
  else lado = (Math.random() < (pe.atk === 1 ? 0.55 : DIF[dif].pen)) ? ladoBola : -ladoBola;
  gk.vx = lado * DIF[dif].gkVel * 1.15;
  gk.mergulho = 0.42; gk.sdx = lado; gk.sdy = 0;  // saltinho de barriga
  chutar(pe.taker, alvo, golY, 545, true);
  pe.fase = 'voo'; pe.timer = 0;
}

// ---------------- Fluxo da partida ----------------
function escolherCtrl() {
  let best = null, bd = 1e9;
  for (const p of players) {
    if (p.side !== 0 || p.gk) continue;
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < bd) { bd = d; best = p; }
  }
  if (!ctrl || ctrl.gk || trocaManual) { ctrl = best; return; }
  if (best !== ctrl && bd < Math.hypot(ball.x - ctrl.x, ball.y - ctrl.y) - 55) ctrl = best;
}

function updatePlay(dt) {
  M.tempo += dt;
  if (M.half === 1 && !M.hidra1 && M.tempo >= HALF_LEN / 2) {
    M.hidra1 = true; M.estado = 'hidratacao'; M.timer = 3; M.hidraTexto = '💧 PAUSA PARA HIDRATAÇÃO';
    for (const pl of players) { pl.vx = 0; pl.vy = 0; }
    somApito();
    return;
  }
  if (M.half === 2 && !M.hidra2 && M.tempo >= HALF_LEN * 1.5) {
    M.hidra2 = true; M.estado = 'hidratacao'; M.timer = 3; M.hidraTexto = '🥤 PAUSA PARA O LANCHE';
    for (const pl of players) { pl.vx = 0; pl.vy = 0; }
    somApito();
    return;
  }
  if (M.half === 1 && M.tempo >= HALF_LEN) {
    M.half = 2; M.estado = 'intervalo'; M.timer = 2.2;
    anunciar('FIM DO 1º TEMPO'); somApito2();
    return;
  }
  if (M.half === 2 && M.tempo >= HALF_LEN * 2) { fimDePartida(); return; }
  if (M.half === 3 && M.tempo >= HALF_LEN * 2 + 60) { fimDePartida(); return; }
  players = players.filter(p => !p.fora);   // expulsos saem de campo
  escolherCtrl();
  for (const p of players) {
    if (p.slide > 0 || p.levant > 0) continue;  // sem controle durante o carrinho
    if (p === ctrl) inputUser(p, dt);
    else if (p.gk) aiGoleiro(p, dt);
    else aiLinha(p, dt);
  }
  for (const p of players) fisicaJogador(p, dt);
  colisaoJogadores(dt);
  fisicaBola(dt);
}

function updateJogo(dt) {
  if (M.avisoT > 0) M.avisoT -= dt;
  if (M.estado === 'play' || M.estado === 'parada' || M.estado === 'penalti' || M.estado === 'hidratacao')
    updateArbitro(dt);
  switch (M.estado) {
    case 'play': updatePlay(dt); break;
    case 'parada':
      updateParada(dt);
      fisicaBola(dt);
      break;
    case 'penalti': updatePenalti(dt); break;
    case 'hidratacao':
      M.timer -= dt;
      if (Math.random() < 2.2 * dt) particulas.push({ tipo: 'texto', texto: Math.random() < 0.5 ? 'GLU GLU!' : 'AAAH!',
        x: CX + (Math.random() - 0.5) * 200, y: (M.hidra2 ? FY1 - 40 : FY0 + 40), vx: 0, vy: -25, vida: 0.9 });
      if (M.timer <= 0) { M.estado = 'play'; somApito(); }
      break;
    case 'gol':
      M.golTimer -= dt;
      for (const p of players) p.wobble = Math.abs(Math.sin(clock * 10)) * 0.8;
      if (M.autor) {
        M.autor.comendo = Math.max(0.01, M.autor.comendo - dt);
        if (Math.random() < 7 * dt) particulas.push({ tipo: 'migalha', x: M.autor.x + 12,
          y: M.autor.y - 14, vx: (Math.random() - 0.5) * 70, vy: 50, vida: 0.5 });
        if (Math.random() < 1.4 * dt) particulas.push({ tipo: 'texto', texto: 'NHAC!',
          x: M.autor.x, y: M.autor.y - 46, vx: 0, vy: -30, vida: 0.8 });
      }
      if (M.golTimer <= 0) {
        if (M.autor) M.autor.comendo = 0;
        posicionar(M.saida); M.estado = 'play'; somApito();
      }
      break;
    case 'replay':
      if (acaoChute) { M.replayIdx = M.replay.length; }
      else {
        M.replayTimer += dt;
        if (M.replayTimer > 0.06) { M.replayTimer = 0; M.replayIdx++; }
      }
      if (M.replayIdx >= M.replay.length) { posicionar(M.saida); M.estado = 'play'; somApito(); }
      break;
    case 'intervalo':
      M.timer -= dt;
      if (M.timer <= 0) {
        if (M.half === 2) { M.inv = true; posicionar(1); }
        else posicionar(0);   // prorrogação
        M.estado = 'play'; somApito();
      }
      break;
    case 'abertura': updateAbertura(dt); break;
    case 'tatica': break;
    case 'disputa': updateDisputa(dt); break;
  }
}

function fimDePartida() {
  somApito2();
  const [ga, gb] = M.placar;
  if (modo === 'amistoso') { tela = 'fimjogo'; return; }
  if (modo === 'brasileirao') { registrarLiga(ga, gb); tela = 'liga'; return; }
  if (modo === 'champions') {
    if (champions.fase === 'grupos') { registrarGrupoChampions(ga, gb); return; }
  } else if (copa.fase === 'grupos') { registrarGrupo(ga, gb); return; }
  if (ga === gb) {
    if (!M.prorrog) {          // tempo de acréscimos do mata-mata
      M.prorrog = true; M.half = 3;
      M.estado = 'intervalo'; M.timer = 2.2;
      anunciar('PRORROGAÇÃO! +1:00');
      return;
    }
    M.estado = 'disputa';
    M.disputa = { g: [0, 0], hist: [[], []], vez: 0, timer: 1.6, fim: false, venceu: -1 };
    anunciar('PÊNALTIS!');
    somTorcida(0.15, 1.6, 850);
    return;
  }
  avancarFaseAtual(ga > gb);
}

// dispara o avanço no torneio certo (Copa ou Champions) conforme o modo ativo
function avancarFaseAtual(venceuUser) {
  if (modo === 'champions') avancarMataMataChampions(venceuUser);
  else avancarMataMata(venceuUser);
}

function updateDisputa(dt) {
  const D = M.disputa;
  D.timer -= dt;
  if (D.timer > 0) return;
  if (D.fim) { avancarFaseAtual(D.venceu === 0); return; }
  iniciarPenalti(D.vez, true);   // próxima cobrança, valendo!
}

function resolveDisputa(converteu) {
  const D = M.disputa;
  D.hist[D.vez].push(converteu);
  if (converteu) { D.g[D.vez]++; somGol(); somTorcida(0.2, 1.4, 1000); }
  else { somTromba(); somTorcida(0.1, 0.8, 650); }
  M.pen = null;
  ball.vx = 0; ball.vy = 0; ball.z = 0; ball.vz = 0; ball.dono = null;
  M.estado = 'disputa';
  D.vez = 1 - D.vez;
  D.timer = 1.6;
  const na = D.hist[0].length, nb = D.hist[1].length;
  if (na === nb && na >= 5 && D.g[0] !== D.g[1]) {
    D.fim = true; D.venceu = D.g[0] > D.g[1] ? 0 : 1; D.timer = 2.6; somApito2();
    return;
  }
  if (na <= 5 && nb <= 5) {
    const restA = 5 - na, restB = 5 - nb;
    if (D.g[0] > D.g[1] + restB || D.g[1] > D.g[0] + restA) {
      D.fim = true; D.venceu = D.g[0] > D.g[1] ? 0 : 1; D.timer = 2.6; somApito2();
    }
  }
}

// ---------------- Torneios (Copa do Mundo e Champions League) ----------------
// Modelo enxuto: sorteia um grupo de 4 com o usuário, só esse grupo é
// acompanhado; no mata-mata sorteia um adversário do "pote" dos que sobraram.
function novoTorneio(ini, fim) {
  const outros = [];
  for (let i = ini; i < fim; i++) if (i !== selUser) outros.push(i);
  for (let i = outros.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [outros[i], outros[j]] = [outros[j], outros[i]];
  }
  const grupo = [selUser, outros[0], outros[1], outros[2]];
  const tab = {};
  for (const g of grupo) tab[g] = { pts: 0, j: 0, gp: 0, gc: 0 };
  return { fase: 'grupos', rodada: 0, grupo, tab, usados: new Set(grupo), fim: null, adv: -1, restantes: outros.slice(3) };
}

function advDaRodadaT(torneio) { return torneio.grupo[1 + torneio.rodada]; }
function atualizaTab(tab, a, b, ga, gb) {
  const A = tab[a], B = tab[b];
  A.j++; B.j++; A.gp += ga; A.gc += gb; B.gp += gb; B.gc += ga;
  if (ga > gb) A.pts += 3; else if (gb > ga) B.pts += 3; else { A.pts++; B.pts++; }
}
function sortearAdv(torneio) {
  const resto = torneio.restantes.filter(i => !torneio.usados.has(i));
  const pick = resto[Math.floor(Math.random() * resto.length)];
  torneio.usados.add(pick);
  return pick;
}
function registrarGrupoT(torneio, ga, gb) {
  const adv = advDaRodadaT(torneio);
  atualizaTab(torneio.tab, selUser, adv, ga, gb);
  const outros = torneio.grupo.slice(1).filter(t => t !== adv);
  const s1 = Math.floor(Math.random() * 2 + Math.random() * forcaDe(outros[0]) / 2.2);
  const s2 = Math.floor(Math.random() * 2 + Math.random() * forcaDe(outros[1]) / 2.2);
  atualizaTab(torneio.tab, outros[0], outros[1], s1, s2);
  torneio.rodada++;
  if (torneio.rodada >= 3) {
    const ordem = torneio.grupo.slice().sort((a, b) => {
      const A = torneio.tab[a], B = torneio.tab[b];
      return (B.pts - A.pts) || ((B.gp - B.gc) - (A.gp - A.gc)) || (B.gp - A.gp);
    });
    torneio.ordem = ordem;
    if (ordem.indexOf(selUser) < 2) { torneio.fase = 'oitavas'; torneio.adv = sortearAdv(torneio); }
    else torneio.fim = 'eliminado';
  }
}
function avancarMataMataT(torneio, venceuUser) {
  if (!venceuUser) { torneio.fim = 'eliminado'; return; }
  if (torneio.fase === 'final') { torneio.fim = 'campeao'; return; }
  torneio.fase = torneio.fase === 'oitavas' ? 'quartas' : torneio.fase === 'quartas' ? 'semi' : 'final';
  torneio.adv = sortearAdv(torneio);
}

// ---- Copa do Mundo ----
function iniciarCopa() { copa = novoTorneio(0, N_COPA); tela = 'copa'; }
function advDaRodada() { return advDaRodadaT(copa); }
function registrarGrupo(ga, gb) { registrarGrupoT(copa, ga, gb); tela = 'copa'; }
function avancarMataMata(venceuUser) { avancarMataMataT(copa, venceuUser); tela = 'copa'; }

// ---- Liga dos Campeões ----
function iniciarChampions() { champions = novoTorneio(N_EURO0, N_EURO1); tela = 'champions'; }
function advDaRodadaChampions() { return advDaRodadaT(champions); }
function registrarGrupoChampions(ga, gb) { registrarGrupoT(champions, ga, gb); tela = 'champions'; }
function avancarMataMataChampions(venceuUser) { avancarMataMataT(champions, venceuUser); tela = 'champions'; }

// ---------------- Partículas ----------------
function atualizarParticulas(dt) {
  for (const p of particulas) { p.x += p.vx * dt; p.y += p.vy * dt; p.vida -= dt; }
  particulas = particulas.filter(p => p.vida > 0);
  for (const c of confetes) { c.x += c.vx * dt; c.y += c.vy * dt; c.rot += 3 * dt; c.vida -= dt; }
  confetes = confetes.filter(c => c.vida > 0 && c.y < H + 30);
}

// grava um instantâneo leve do lance pra poder mostrar o replay do gol
function gravarReplayFrame() {
  replayBuf.push({
    bx: ball.x, by: ball.y, bz: ball.z, bspin: ball.spin,
    jogadores: players.map(p => ({
      x: p.x, y: p.y, vx: p.vx, vy: p.vy, side: p.side, gk: p.gk, tom: p.tom, cab: p.cab,
      num: p.num, nome: p.nome, fase: p.fase, wobble: p.wobble, slide: p.slide, levant: p.levant,
      mergulho: p.mergulho, bike: p.bike, pulo: p.pulo, sdx: p.sdx, sdy: p.sdy,
      arremesso: p.arremesso, stamina: p.stamina, amarelos: p.amarelos, comendo: p.comendo
    }))
  });
  if (replayBuf.length > 110) replayBuf.shift();   // ~3.5s de lance
}

function update(dt) {
  clock += dt;
  if (tela === 'jogo' && M) updateJogo(dt);
  if (tela === 'jogo' && M) {
    replayTick++;
    if (replayTick % 2 === 0 && (M.estado === 'play' || M.estado === 'parada' || M.estado === 'penalti' || M.estado === 'hidratacao'))
      gravarReplayFrame();
    const alvoC = camAlvo();
    if (!camS || M.estado === 'abertura') camS = alvoC;
    else {
      const f = Math.min(1, 6 * dt);
      camS.x += (alvoC.x - camS.x) * f;
      camS.y += (alvoC.y - camS.y) * f;
      camS.s += (alvoC.s - camS.s) * f;
    }
  } else camS = null;
  atualizarParticulas(dt);
  acaoChute = false; acaoPasse = false; trocaManual = false;
}

canvas.addEventListener('touchstart', () => { usaToque = true; });

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------------- Câmera (com zoom cinematográfico) ----------------
let camS = null;
function camAlvo() {
  if (M && M.estado === 'abertura') {
    const z = M.ab.fase === 2 ? M.ab.zoom : 0;
    const s0 = Math.min(H / WH, W / WW) * 0.98;
    const s = s0 + (1 - s0) * z * z;
    const cx1 = clamp(ball.x, W / 2, WW - W / 2), cy1 = clamp(ball.y, H / 2, WH - H / 2);
    return { x: WW / 2 + (cx1 - WW / 2) * z, y: WH / 2 + (cy1 - WH / 2) * z, s };
  }
  if (M && M.estado === 'penalti' && M.pen) {
    const gy = golAtkY(M.pen.atk), s = 1.55;
    return { x: clamp(CX, W / 2 / s, WW - W / 2 / s), y: clamp((ball.y + gy) / 2, H / 2 / s, WH - H / 2 / s), s };
  }
  if (M && M.estado === 'parada' && M.parada && M.parada.ensaiada) {
    const gy = golAtkY(M.parada.side), s = 1.3;
    return { x: clamp((ball.x + CX) / 2, W / 2 / s, WW - W / 2 / s), y: clamp((ball.y + gy) / 2, H / 2 / s, WH - H / 2 / s), s };
  }
  const ahead = M ? dirDe(0) * 42 : 0;
  return { x: clamp(ball.x, W / 2, WW - W / 2), y: clamp(ball.y + ahead, H / 2, WH - H / 2), s: 1 };
}
function cam() { return camS || camAlvo(); }

function drawGordinho(p) {
  const tc = corTime(p.side);
  const c1 = p.gk ? '#3d3d3d' : tc[0], c2 = p.gk ? '#111' : tc[1];
  const pele = TONS[p.tom];
  const v = Math.hypot(p.vx, p.vy);
  const andando = v > 25;
  const costas = p.vy < -25 && Math.abs(p.vy) > Math.abs(p.vx) * 0.7; // subindo: de costas
  const deitado = p.slide > 0 || p.levant > 0.25 || p.mergulho > 0;
  const wob = p.wobble * 0.12 * Math.sin(clock * 30) +
    (andando ? 0.05 * Math.sin(p.fase * 2) : 0.015 * Math.sin(clock * 3 + p.fase));

  ctx.save();
  ctx.translate(p.x, p.y);
  // sombra suave
  const sg = ctx.createRadialGradient(0, R * 0.95, 2, 0, R * 0.95, R * 1.1);
  sg.addColorStop(0, 'rgba(0,0,0,0.32)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.ellipse(0, R * 0.95, R * 1.1, R * 0.42, 0, 0, 6.29); ctx.fill();

  if (p.bike > 0) {            // bicicleta: gira de ponta-cabeça no ar
    const pr = 1 - p.bike / 0.55;
    ctx.translate(0, -Math.sin(pr * Math.PI) * 22);
    ctx.rotate(Math.PI * pr);
  } else if (p.mergulho > 0) {  // goleiro num voo baixinho de barriga
    ctx.translate(0, -Math.sin(clamp(1 - p.mergulho / 0.45, 0, 1) * Math.PI) * 9);
    ctx.rotate(Math.atan2(p.sdy, p.sdx) - 1.5708);
  } else if (deitado) ctx.rotate(Math.atan2(p.sdy, p.sdx) - 1.5708);
  else if (p.pulo > 0) ctx.translate(0, -Math.sin((0.4 - p.pulo) / 0.4 * Math.PI) * 13);

  const sw = andando ? Math.sin(p.fase * 2.2) : 0;
  ctx.lineCap = 'round';
  // pernas articuladas com chuteira
  for (const s of [-1, 1]) {
    const passo = sw * s;
    const hx = s * 6, hy = R * 0.5;
    const fx = hx + passo * 6, fy = R * 0.95 - Math.max(0, passo) * 5;
    ctx.strokeStyle = pele; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(fx, fy); ctx.stroke();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.ellipse(fx + s * 1.5, fy + 2.5, 4.5, 2.8, 0, 0, 6.29); ctx.fill();
  }
  // calção
  ctx.fillStyle = c2;
  ctx.beginPath(); ctx.ellipse(0, R * 0.62, R * 0.72, R * 0.34, 0, 0, 6.29); ctx.fill();

  ctx.scale(1 + wob, 1 - wob);
  ctx.strokeStyle = pele; ctx.lineWidth = 4.4;
  if (p.arremesso && M && M.estado === 'parada') {
    // lateral: as duas mãos erguidas segurando a bola
    for (const s of [-1, 1]) {
      ctx.beginPath(); ctx.moveTo(s * R * 0.9, -3); ctx.lineTo(s * 6, -R * 1.55); ctx.stroke();
    }
  } else if (p.mergulho > 0) {
    // braços esticados na direção do voo
    for (const s of [-1, 1]) {
      ctx.beginPath(); ctx.moveTo(s * R * 0.5, -6); ctx.lineTo(s * R * 0.7, -R * 1.7); ctx.stroke();
    }
  } else {
    // braços com cotovelo, balançando em oposição às pernas
    for (const s of [-1, 1]) {
      const bal = andando ? -sw * s : Math.sin(clock * 2 + p.fase) * 0.3;
      const ox = s * R * 0.92, oy = -3;
      const ex2 = ox + s * 3 + bal * 4, ey2 = oy + 9;
      const hx2 = ex2 - s * 1 + bal * 6, hy2 = ey2 + 8 - Math.max(0, bal) * 8;
      ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex2, ey2); ctx.lineTo(hx2, hy2); ctx.stroke();
    }
  }
  // camisa (o barrigão)
  const grad = ctx.createRadialGradient(-R * 0.35, -R * 0.5, 2, 0, 0, R + 5);
  grad.addColorStop(0, c1); grad.addColorStop(0.75, c1); grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 3, R, R * 0.92, 0, 0, 6.29); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  ctx.stroke();
  const numCor = ['#ffffff', '#ffdc00', '#ffd700', '#ffd100', '#ffb612', '#ffb81c', '#f9e814'].includes(c1) ? '#333' : '#fff';
  if (costas && !deitado) {
    // DE COSTAS: numerão nas costas, nuca cabeluda
    ctx.fillStyle = numCor;
    ctx.font = 'bold 15px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(p.num, 0, 7);
    ctx.fillStyle = pele;
    ctx.beginPath(); ctx.arc(0, -R * 1.02, 8.2, 0, 6.29); ctx.fill();
    ctx.fillStyle = p.cab;
    ctx.beginPath(); ctx.arc(0, -R * 1.05, 7.2, 0, 6.29); ctx.fill();
    ctx.fillStyle = pele;
    ctx.beginPath(); ctx.arc(-7.2, -R * 1.02, 2, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(7.2, -R * 1.02, 2, 0, 6.29); ctx.fill();
  } else {
    // DE FRENTE: barriga, rosto e suor
    ctx.fillStyle = pele;
    ctx.beginPath(); ctx.ellipse(0, R * 0.52, R * 0.48, R * 0.24, 0, 0, 6.29); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.arc(0, R * 0.52, 1.6, 0, 6.29); ctx.fill();
    ctx.fillStyle = numCor;
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(p.num, 0, -1);
    ctx.fillStyle = pele;
    ctx.beginPath(); ctx.arc(0, -R * 1.02, 8.2, 0, 6.29); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.ellipse(-2.5, -R * 1.02 - 3.5, 2.6, 1.5, -0.5, 0, 6.29); ctx.fill();
    ctx.fillStyle = p.cab;
    ctx.beginPath(); ctx.arc(0, -R * 1.02 - 4, 5.4, 3.3, 6.1); ctx.fill();
    const bd = Math.hypot(ball.x - p.x, ball.y - p.y) || 1;
    const ex = (ball.x - p.x) / bd * 1.4, ey = (ball.y - p.y) / bd * 1.4;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3.2, -R * 1.02 - 1.5, 2.2, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(3.2, -R * 1.02 - 1.5, 2.2, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(-3.2 + ex, -R * 1.02 - 1.5 + ey, 1.1, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(3.2 + ex, -R * 1.02 - 1.5 + ey, 1.1, 0, 6.29); ctx.fill();
    const cansado = p === ctrl ? 1 - p.stamina : 0.3;
    ctx.fillStyle = 'rgba(235,100,90,' + (0.2 + cansado * 0.4) + ')';
    ctx.beginPath(); ctx.arc(-5, -R * 1.02 + 2.5, 1.8, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -R * 1.02 + 2.5, 1.8, 0, 6.29); ctx.fill();
    ctx.strokeStyle = 'rgba(60,30,20,0.9)';
    ctx.lineWidth = 1.2;
    if ((p === ctrl && p.stamina < 0.35) || v > 240) {
      ctx.fillStyle = 'rgba(60,30,20,0.9)';
      ctx.beginPath(); ctx.ellipse(0, -R * 1.02 + 4, 1.8, 2.4, 0, 0, 6.29); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0, -R * 1.02 + 2.5, 2.6, 0.4, 2.7); ctx.stroke();
    }
  }
  ctx.restore();
  // nome + cartão amarelo pendurado
  ctx.font = 'bold 8.5px Arial';
  ctx.textAlign = 'center';
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.fillStyle = '#fff';
  ctx.strokeText(p.nome, p.x, p.y + R + 13);
  ctx.fillText(p.nome, p.x, p.y + R + 13);
  if (p.amarelos === 1) { ctx.fillStyle = '#ffd400'; ctx.fillRect(p.x + 16, p.y + R + 5, 6, 9); }
  if (p.comendo > 0) {
    const mastiga = Math.sin(clock * 14) * 2.5;
    ctx.font = '15px Arial';
    ctx.fillText('🍔', p.x + 14, p.y - R + mastiga);
  }
  if (p === ctrl) {
    ctx.fillStyle = '#ffd166';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - R - 18);
    ctx.lineTo(p.x - 6, p.y - R - 27);
    ctx.lineTo(p.x + 6, p.y - R - 27);
    ctx.closePath(); ctx.fill();
  }
}

// ---------------- Bola v2 ----------------
let bolaHist = [];
function pent(px, py, r2) {
  ctx.fillStyle = '#2f2f2f';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * 6.2832 - 1.5708;
    const vx2 = px + Math.cos(a) * r2, vy2 = py + Math.sin(a) * r2;
    if (i) ctx.lineTo(vx2, vy2); else ctx.moveTo(vx2, vy2);
  }
  ctx.closePath(); ctx.fill();
}
function drawBola() {
  const v = Math.hypot(ball.vx, ball.vy);
  bolaHist.push({ x: ball.x, y: ball.y });
  if (bolaHist.length > 6) bolaHist.shift();
  if (v > 260) {
    for (let i = 0; i < bolaHist.length - 1; i++) {
      ctx.globalAlpha = (i + 1) / bolaHist.length * 0.22;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(bolaHist[i].x, bolaHist[i].y, BR * (0.45 + i / bolaHist.length * 0.5), 0, 6.29); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.save();
  const ssh = ctx.createRadialGradient(ball.x, ball.y + BR * 0.85, 1, ball.x, ball.y + BR * 0.85, BR);
  ssh.addColorStop(0, 'rgba(0,0,0,0.3)'); ssh.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ssh;
  ctx.beginPath(); ctx.ellipse(ball.x, ball.y + BR * 0.85, BR, BR * 0.4, 0, 0, 6.29); ctx.fill();
  ctx.translate(ball.x, ball.y - ball.z * 0.55);
  const zs = 1 + ball.z / 240;
  ctx.scale(zs, zs);
  const ang = Math.atan2(ball.vy, ball.vx);
  const sq = Math.min(0.18, v / 3200);   // squash sutil na direção do voo
  ctx.rotate(ang); ctx.scale(1 + sq, 1 - sq); ctx.rotate(-ang);
  ctx.rotate(ball.spin);
  const g = ctx.createRadialGradient(-2.6, -2.6, 0.8, 0, 0, BR + 1);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.65, '#ececec'); g.addColorStop(1, '#b0b0b0');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, BR, 0, 6.29); ctx.fill();
  ctx.strokeStyle = '#9a9a9a'; ctx.lineWidth = 0.8; ctx.stroke();
  pent(0, 0, 3);
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * 6.2832 + 0.63;
    pent(Math.cos(a) * BR * 0.72, Math.sin(a) * BR * 0.72, 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 3, Math.sin(a) * 3);
    ctx.lineTo(Math.cos(a) * BR * 0.55, Math.sin(a) * BR * 0.55);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(-2.8, -3, 2.4, 1.4, -0.6, 0, 6.29); ctx.fill();
  ctx.restore();
}

function drawParticulasMundo() {
  for (const p of particulas) {
    if (p.tipo === 'texto') {
      ctx.globalAlpha = Math.min(1, p.vida);
      ctx.fillStyle = '#ffd166'; ctx.strokeStyle = '#5a3a00'; ctx.lineWidth = 3;
      ctx.font = 'bold 17px "Comic Sans MS","Segoe UI",Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(p.texto, p.x, p.y);
      ctx.fillText(p.texto, p.x, p.y);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = Math.min(1, p.vida * 2);
      ctx.fillStyle = p.tipo === 'grama' ? '#4aa565' : p.tipo === 'migalha' ? '#c9973f' : '#8ecae6';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.4, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawHUD() {
  const A = SELECOES[M.iA], B = SELECOES[M.iB];
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  roundRect(W / 2 - 175, 10, 350, 52, 10); ctx.fill();
  ctx.textAlign = 'right'; ctx.font = 'bold 16px "Segoe UI",Arial';
  ctx.fillStyle = '#ffd166'; ctx.fillText(A.s, W / 2 - 48, 36);
  ctx.textAlign = 'left'; ctx.fillStyle = '#8ecae6'; ctx.fillText(B.s, W / 2 + 48, 36);
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 24px "Segoe UI",Arial';
  ctx.fillText(M.placar[0] + ' x ' + M.placar[1], W / 2, 38);
  const tt = M.half === 1 ? M.tempo : M.half === 2 ? M.tempo - HALF_LEN : M.tempo - HALF_LEN * 2;
  const mm = Math.floor(tt / 60), ss = Math.floor(tt % 60);
  ctx.font = '13px "Segoe UI",Arial'; ctx.fillStyle = '#ddd';
  let etiqueta = (M.half === 3 ? 'PRORROG. ' : M.half + 'T ') + mm + ':' + String(ss).padStart(2, '0');
  if (modo === 'copa') etiqueta += ' · ' + FASES[copa.fase];
  else if (modo === 'brasileirao') etiqueta += ' · Rodada ' + (liga.rodada + 1);
  ctx.fillText(etiqueta, W / 2, 56);
  // fôlego
  if (ctrl) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(14, H - 26, 120, 12, 6); ctx.fill();
    ctx.fillStyle = ctrl.stamina > 0.3 ? '#06d6a0' : '#ef476f';
    if (ctrl.stamina > 0.02) { roundRect(14, H - 26, 120 * ctrl.stamina, 12, 6); ctx.fill(); }
    ctx.font = '11px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
    ctx.fillText('fôlego', 14, H - 32);
  }
  if (usaToque) {
    for (const b of [[btnChute, 'CHUTE'], [btnPasse, 'PASSE']]) {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(b[0].x, b[0].y, b[0].r, 0, 6.29); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
      ctx.fillText(b[1], b[0].x, b[0].y + 4);
    }
    if (joy.ativo) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(joy.ax, joy.ay, 40, 0, 6.29); ctx.stroke();
      const l = Math.hypot(joy.dx, joy.dy) || 1, cl = Math.min(l, 40);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(joy.ax + joy.dx / l * cl, joy.ay + joy.dy / l * cl, 16, 0, 6.29); ctx.fill();
    }
  } else {
    ctx.font = '11px "Segoe UI",Arial'; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.textAlign = 'right';
    ctx.fillText('ESPAÇO chuta/carrinho · X passa/desarme · SHIFT corre · C troca · P tática', W - 10, H - 12);
  }
  // botão de tática
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.arc(W - 30, 30, 20, 0, 6.29); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
  ctx.fillText('⏸', W - 30, 36);
  botoes.push({ x: W - 56, y: 4, w: 52, h: 52, cb: toggleTatica });
  // avisos e overlays
  if (M.avisoT > 0) {
    ctx.save(); ctx.translate(W / 2, H * 0.3);
    const esc = 1 + 0.06 * Math.sin(clock * 12);
    ctx.scale(esc, esc);
    ctx.font = 'bold 34px "Comic Sans MS","Segoe UI",Arial';
    ctx.textAlign = 'center'; ctx.lineWidth = 6;
    ctx.strokeStyle = '#5a3a00'; ctx.fillStyle = '#ffd166';
    ctx.strokeText(M.aviso, 0, 0); ctx.fillText(M.aviso, 0, 0);
    ctx.restore();
  }
  if (M.estado === 'gol') {
    ctx.save(); ctx.translate(W / 2, H / 2);
    ctx.scale(1 + 0.08 * Math.sin(clock * 12), 1 + 0.08 * Math.sin(clock * 12));
    ctx.font = 'bold 52px "Comic Sans MS","Segoe UI",Arial';
    ctx.textAlign = 'center'; ctx.lineWidth = 8;
    ctx.strokeStyle = '#5a3a00'; ctx.fillStyle = '#ffd166';
    ctx.strokeText(M.fraseGol, 0, 0); ctx.fillText(M.fraseGol, 0, 0);
    ctx.restore();
    if (M.replay && M.replay.length > 15) {
      botao(W / 2 - 110, H - 150, 220, 50, '📺 VER REPLAY', () => {
        M.estado = 'replay'; M.replayIdx = 0; M.replayTimer = 0;
      }, '#2a6f4e');
    }
  }
  if (M.estado === 'hidratacao') {
    ctx.save(); ctx.translate(W / 2, H * 0.35);
    const esc = 1 + 0.05 * Math.sin(clock * 8);
    ctx.scale(esc, esc);
    ctx.font = 'bold 28px "Comic Sans MS","Segoe UI",Arial';
    ctx.textAlign = 'center'; ctx.lineWidth = 7;
    ctx.strokeStyle = '#5a3a00'; ctx.fillStyle = '#8ecae6';
    ctx.strokeText(M.hidraTexto, 0, 0); ctx.fillText(M.hidraTexto, 0, 0);
    ctx.restore();
    ctx.font = '16px "Segoe UI",Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText('a bola volta em ' + Math.ceil(M.timer) + 's...', W / 2, H * 0.35 + 38);
  }
  if (M.estado === 'parada' && M.parada && M.parada.side === 0) {
    ctx.font = 'bold 15px "Segoe UI",Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    if (M.parada.ensaiada)
      ctx.fillText(usaToque ? 'arraste p/ mirar · CHUTE cobra' : '◀ ▶ mira · ▲▼ altura · ESPAÇO cobra por cima da barreira', W / 2, H - 46);
    else if (M.parada.tipo === 'lateral' || M.parada.tipo === 'meta' || M.parada.tipo === 'falta')
      ctx.fillText(usaToque ? 'arraste p/ mirar · CHUTE lança' : '◀ ▶ mira · ▲▼ altura · ESPAÇO lança', W / 2, H - 46);
    else
      ctx.fillText(usaToque ? 'CHUTE cruza · PASSE toca' : 'ESPAÇO cruza · X passa', W / 2, H - 46);
  }
  if (M.estado === 'gol' && (M.autor || M.golContra)) drawTelao();
  if (M.estado === 'penalti' && M.pen && M.pen.fase === 'prep') {
    ctx.font = 'bold 15px "Segoe UI",Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
    if (M.pen.atk === 0)
      ctx.fillText(usaToque ? 'arraste p/ mirar · CHUTE bate' : '◀ ▶ mira · ESPAÇO bate', W / 2, H - 46);
    else if (M.pen.disp)
      ctx.fillText((usaToque ? 'arraste' : '◀ ▶') + ' para escolher o canto do goleiro!' +
        (M.pen.escolha ? (M.pen.escolha < 0 ? ' [ESQUERDA]' : ' [DIREITA]') : ''), W / 2, H - 46);
  }
  if (M.estado === 'disputa') drawDisputa();
}

function drawDisputa() {
  const D = M.disputa;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  roundRect(40, H / 2 - 150, W - 80, 300, 16); ctx.fill();
  ctx.textAlign = 'center'; ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 24px "Segoe UI",Arial';
  ctx.fillText('DISPUTA DE PÊNALTIS', W / 2, H / 2 - 110);
  const A = SELECOES[M.iA], B = SELECOES[M.iB];
  ctx.font = 'bold 30px "Segoe UI",Arial'; ctx.fillStyle = '#fff';
  ctx.fillText(A.s + '  ' + D.g[0] + ' x ' + D.g[1] + '  ' + B.s, W / 2, H / 2 - 60);
  for (let s = 0; s < 2; s++) {
    const y = H / 2 - 15 + s * 45;
    ctx.textAlign = 'left'; ctx.font = 'bold 15px Arial'; ctx.fillStyle = s === 0 ? '#ffd166' : '#8ecae6';
    ctx.fillText(s === 0 ? A.s : B.s, 70, y + 6);
    for (let i = 0; i < Math.max(5, D.hist[s].length); i++) {
      const cx2 = 130 + i * 36;
      ctx.beginPath(); ctx.arc(cx2, y, 13, 0, 6.29);
      if (i < D.hist[s].length) ctx.fillStyle = D.hist[s][i] ? '#06d6a0' : '#ef476f';
      else ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fill();
      if (i < D.hist[s].length) {
        ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
        ctx.fillText(D.hist[s][i] ? '✓' : '✗', cx2, y + 5);
        ctx.textAlign = 'left'; ctx.font = 'bold 15px Arial';
      }
    }
  }
  if (D.fim) {
    ctx.textAlign = 'center'; ctx.font = 'bold 20px "Segoe UI",Arial'; ctx.fillStyle = '#ffd166';
    ctx.fillText((D.venceu === 0 ? A.n : B.n) + ' venceu nos pênaltis!', W / 2, H / 2 + 115);
  }
}

function drawReplayFrame() {
  const idx = Math.min(M.replayIdx, M.replay.length - 1);
  const frame = M.replay[idx];
  const prev = M.replay[Math.max(0, idx - 1)];
  const dtRec = 2 / 60;
  const realBall = { x: ball.x, y: ball.y, z: ball.z, spin: ball.spin, vx: ball.vx, vy: ball.vy };
  const realPlayers = players, realCtrl = ctrl;
  ball.x = frame.bx; ball.y = frame.by; ball.z = frame.bz; ball.spin = frame.bspin;
  ball.vx = (frame.bx - prev.bx) / dtRec; ball.vy = (frame.by - prev.by) / dtRec;
  players = frame.jogadores; ctrl = null;

  const c = { x: clamp(ball.x, W / 2, WW - W / 2), y: clamp(ball.y, H / 2, WH - H / 2), s: 1 };
  ctx.fillStyle = '#0a1f14'; ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2); ctx.scale(c.s, c.s); ctx.translate(-c.x, -c.y);
  drawCampo(); drawBancos();
  const ordem = players.slice().sort((a, b) => a.y - b.y);
  let bolaOk = false;
  for (const p of ordem) { if (!bolaOk && ball.y < p.y) { drawBola(); bolaOk = true; } drawGordinho(p); }
  if (!bolaOk) drawBola();
  ctx.restore();

  Object.assign(ball, realBall);
  players = realPlayers; ctrl = realCtrl;

  ctx.textAlign = 'center';
  ctx.font = 'bold 24px "Comic Sans MS","Segoe UI",Arial'; ctx.lineWidth = 5;
  ctx.strokeStyle = '#5a3a00'; ctx.fillStyle = '#ffd166';
  ctx.strokeText('📺 REPLAY DO GOL', W / 2, 42);
  ctx.fillText('📺 REPLAY DO GOL', W / 2, 42);
  ctx.font = '13px "Segoe UI",Arial'; ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText(usaToque ? 'toque para pular' : 'ESPAÇO para pular', W / 2, 66);
}

function drawJogo() {
  if (M.estado === 'replay') { drawReplayFrame(); return; }
  const c = cam();
  ctx.fillStyle = '#0a1f14';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(c.s, c.s);
  ctx.translate(-c.x, -c.y);
  drawCampo();
  drawBancos();
  if (M.estado === 'parada' && M.parada && M.parada.ensaiada && M.parada.side === 0) drawTrajetoria();
  if (M.estado === 'parada' && M.parada && M.parada.side === 0 && !M.parada.ensaiada &&
      (M.parada.tipo === 'meta' || M.parada.tipo === 'falta' || M.parada.tipo === 'lateral')) {
    const pa = M.parada;
    const my = pa.tipo === 'lateral' ? pa.py + dirDe(0) * 180 : golAtkY(0);
    ctx.strokeStyle = 'rgba(255,220,80,0.55)'; ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
    ctx.beginPath(); ctx.moveTo(pa.px, pa.py); ctx.lineTo(pa.mira, my); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.beginPath(); ctx.arc(pa.mira, my, 7, 0, 6.29); ctx.fill();
    ctx.strokeStyle = '#5a3a00'; ctx.lineWidth = 2; ctx.stroke();
  }
  if (M.estado === 'penalti' && M.pen && M.pen.fase === 'prep') {
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.beginPath(); ctx.arc(M.pen.mira, golAtkY(M.pen.atk) + (golAtkY(M.pen.atk) === FY0 ? -10 : 10), 6, 0, 6.29); ctx.fill();
    ctx.strokeStyle = '#5a3a00'; ctx.lineWidth = 2; ctx.stroke();
  }
  const ordem = players.slice().sort((a, b) => a.y - b.y);
  let bolaOk = false;
  for (const p of ordem) {
    if (!bolaOk && ball.y < p.y) { drawBola(); bolaOk = true; }
    drawGordinho(p);
  }
  if (!bolaOk) drawBola();
  if (M.estado === 'play' || M.estado === 'parada' || M.estado === 'penalti' || M.estado === 'hidratacao') drawArbitro();
  drawParticulasMundo();
  ctx.restore();
  drawConfetes();
  if (M.estado === 'abertura') drawAbertura();
  else drawHUD();
  if (M.estado === 'tatica') drawTatica();
}

function draw() {
  botoes = [];

  else if (tela === 'selecao') drawSelecao();

  else if (tela === 'fimjogo') drawFimJogo();
}

let ultimoT = performance.now();
function loop(agora) {
  const dt = Math.min(0.033, (agora - ultimoT) / 1000);
  ultimoT = agora;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
